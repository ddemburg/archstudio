let _gAccessToken = null;
let _sbUserEmail  = null;
let _tokenClient  = null;

function gGetTokenClient() {
  if (!_tokenClient) {
    _tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GDRIVE_CLIENT_ID,
      scope: GDRIVE_SCOPE,
      callback: async (resp) => {
        if (resp.access_token) {
          _gAccessToken = resp.access_token;
          try {
            localStorage.setItem('arch_hint', '1');
            const expiry = Date.now() + (resp.expires_in ? resp.expires_in * 1000 : 3500000);
            sessionStorage.setItem('arch_token', resp.access_token);
            sessionStorage.setItem('arch_token_exp', expiry);
            const savedEmail = sessionStorage.getItem('arch_email');
            if (!savedEmail) {
              try {
                const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {headers:{Authorization:'Bearer '+resp.access_token}});
                const info = await r.json();
                if (info.email) {
                  _sbUserEmail = info.email;
                  sessionStorage.setItem('arch_email', info.email);
                  await sbEnsureMember(info.email, info.name||info.email, info.picture||'');
                }
              } catch(e) { console.error('userinfo fetch error:', e); }
            } else {
              _sbUserEmail = savedEmail;
            }
          } catch(e){}
          if (window._gTokenResolve) { window._gTokenResolve(resp.access_token); window._gTokenResolve = null; }
        } else {
          if (window._gTokenReject) { window._gTokenReject(resp.error); window._gTokenReject = null; }
        }
      },
      error_callback: (e) => {
        if (window._gTokenReject) { window._gTokenReject(e); window._gTokenReject = null; }
      }
    });
  }
  return _tokenClient;
}

function gSignIn() {
  return new Promise((resolve, reject) => {
    window._gTokenResolve = resolve;
    window._gTokenReject = reject;
    gGetTokenClient().requestAccessToken({prompt: ''});
  });
}

function gTrySilentSignIn() {
  try {
    const token = sessionStorage.getItem('arch_token');
    const exp = parseInt(sessionStorage.getItem('arch_token_exp') || '0');
    if (token && exp > Date.now() + 60000) {
      _gAccessToken = token;
      const email = sessionStorage.getItem('arch_email');
      if (email) _sbUserEmail = email;
      return Promise.resolve(true);
    }
  } catch(e) {}
  const hint = (() => { try { return localStorage.getItem('arch_hint'); } catch(e) { return null; } })();
  if (!hint) return Promise.resolve(false);
  return new Promise((resolve) => {
    window._gTokenResolve = (token) => resolve(true);
    window._gTokenReject = () => resolve(false);
    try { gGetTokenClient().requestAccessToken({prompt: ''}); } catch(e) { resolve(false); }
  });
}

function gIsSignedIn() { return !!_gAccessToken; }

// ── Supabase helpers ──────────────────────────────────────────────────────────
function sbHeaders(extra) {
  return { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON, 'Content-Type': 'application/json', ...extra };
}

async function sbQuery(path, options={}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, { headers: sbHeaders(), ...options });
  if (!res.ok) { const e = await res.text(); throw new Error('Supabase error: ' + e); }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function sbGetMember(email) {
  if (!email) return null;
  const rows = await sbQuery(`office_members?email=eq.${encodeURIComponent(email)}&active=eq.true&select=*,offices(name)&limit=1`);
  return rows?.[0] || null;
}

async function sbEnsureMember(email, name, picture) {
  let member = await sbGetMember(email);
  if (!member) {
    const offices = await sbQuery('offices', {
      method: 'POST',
      headers: sbHeaders({ 'Prefer': 'return=representation' }),
      body: JSON.stringify({ name: 'המשרד שלי' })
    });
    const officeId = offices[0].id;
    await sbQuery('office_members', {
      method: 'POST',
      headers: sbHeaders({ 'Prefer': 'return=minimal' }),
      body: JSON.stringify({ office_id: officeId, email, name, picture, role: 'admin', assigned_projects: [] })
    });
    await sbQuery('office_data', {
      method: 'POST',
      headers: sbHeaders({ 'Prefer': 'return=minimal' }),
      body: JSON.stringify({ office_id: officeId, data: { projects:[],tasks:[],docs:[],reqs:[],approvs:[],committees:[],partners:[],templates:[],crm:[],leads:[] } })
    });
    member = await sbGetMember(email);
  } else {
    await sbQuery(`office_members?email=eq.${encodeURIComponent(email)}`, {
      method: 'PATCH',
      headers: sbHeaders({ 'Prefer': 'return=minimal' }),
      body: JSON.stringify({ name, picture })
    });
  }
  _sbUserEmail = email;
  try { sessionStorage.setItem('arch_email', email); } catch(e){}
  return member;
}

async function apiLoad() {
  if (!_sbUserEmail) { const s=sessionStorage.getItem('arch_email'); if(s) _sbUserEmail=s; }
  const member = await sbGetMember(_sbUserEmail);
  if (!member) throw new Error('Not a member');
  const rows = await sbQuery(`office_data?office_id=eq.${member.office_id}&limit=1`);
  let data = rows?.[0]?.data || {};
  if (member.role === 'drafter') {
    const assigned = member.assigned_projects || [];
    data = { ...data,
      projects: (data.projects||[]).filter(p => assigned.includes(p.id)),
      tasks:    (data.tasks||[]).filter(t => assigned.includes(t.project_id)),
      docs:     (data.docs||[]).filter(d => assigned.includes(d.project_id)),
      reqs:     (data.reqs||[]).filter(r => assigned.includes(r.project_id)),
      approvs:  (data.approvs||[]).filter(a => assigned.includes(a.project_id)),
      crm: [], leads: [],
    };
  }
  return data;
}

async function apiSave(data) {
  if (!_sbUserEmail) { const s=sessionStorage.getItem('arch_email'); if(s) _sbUserEmail=s; }
  const member = await sbGetMember(_sbUserEmail);
  if (!member) throw new Error('Not a member');
  await sbQuery(`office_data?office_id=eq.${member.office_id}`, {
    method: 'PATCH',
    headers: sbHeaders({ 'Prefer': 'return=minimal' }),
    body: JSON.stringify({ data, updated_at: new Date().toISOString() })
  });
}

async function apiGetMembers() {
  if (!_sbUserEmail) { const s=sessionStorage.getItem('arch_email'); if(s) _sbUserEmail=s; }
  const member = await sbGetMember(_sbUserEmail);
  if (!member) return [];
  return sbQuery(`office_members?office_id=eq.${member.office_id}&active=eq.true&order=joined_at`);
}

async function apiAddMember(email, name, role, assignedProjects=[]) {
  if (!_sbUserEmail) { const s=sessionStorage.getItem('arch_email'); if(s) _sbUserEmail=s; }
  const me = await sbGetMember(_sbUserEmail);
  if (!me || me.role !== 'admin') throw new Error('Admins only');
  await sbQuery('office_members', {
    method: 'POST',
    headers: sbHeaders({ 'Prefer': 'resolution=merge-duplicates,return=minimal' }),
    body: JSON.stringify({ office_id: me.office_id, email: email.trim().toLowerCase(), name: name||email, role, assigned_projects: assignedProjects, active: true })
  });
}

async function sbUploadFile(officeId, projectId, file) {
  const safeName = file.name.replace(/[^a-zA-Z0-9._\-\u0590-\u05FF]/g, '_');
  const path = `${officeId}/${projectId}/${Date.now()}_${safeName}`;
  const formData = new FormData();
  formData.append('', file);
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/project-docs/${path}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON },
    body: formData
  });
  if (!res.ok) { const e = await res.text(); throw new Error('Upload failed: ' + e); }
  return path;
}

async function sbGetSignedUrl(path, expiresIn=86400) {
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/sign/project-docs/${path}`, {
    method: 'POST',
    headers: sbHeaders(),
    body: JSON.stringify({ expiresIn })
  });
  if (!res.ok) throw new Error('Could not get download URL');
  const data = await res.json();
  return SUPABASE_URL + '/storage/v1' + data.signedURL;
}

async function sbDeleteFile(path) {
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/project-docs/${path}`, {
    method: 'DELETE', headers: sbHeaders()
  });
  return res.ok;
}

function useApp(){
  const [projects,setP]=useState([]);
  const [tasks,setT]=useState([]);
  const [docs,setD]=useState([]);
  const [reqs,setR]=useState([]);
  const [approvs,setA]=useState([]);
  const [committees,setC]=useState([]);
  const [partners,setU]=useState([]);
  const [templates,setTpl]=useState([]);
  const [crm,setCRM]=useState([]);
  const [leads,setLeads]=useState([]);
  const [officeMembers,setOfficeMembers]=useState([]);

  // ── Google Drive sync ──────────────────────────────
  const [driveReady,setDriveReady]=useState(false);
  const [driveSyncing,setDriveSyncing]=useState(false);
  const [driveLastSave,setDriveLastSave]=useState(null);
  const [driveError,setDriveError]=useState(null);
  const saveTimer=useRef(null);

  const driveLoad=async()=>{
    try{
      setDriveSyncing(true); setDriveError(null);
      const saved=await apiLoad();
      if(saved){
        if(saved.projects)   setP(saved.projects);
        if(saved.tasks)      setT(saved.tasks);
        if(saved.docs)       setD(saved.docs);
        if(saved.reqs)       setR(saved.reqs);
        if(saved.approvs)    setA(saved.approvs);
        if(saved.committees) setC(saved.committees);
        if(saved.partners)   setU(saved.partners);
        if(saved.templates)  setTpl(saved.templates);
        if(saved.crm)        setCRM(saved.crm);
        if(saved.leads)      setLeads(saved.leads);
        setDriveLastSave(saved._savedAt||null);
      }
      // If no data in Drive yet, load seed data as starting point
      if(!saved){
        setP(SPROJ); setT(STK); setD(SDK); setR(SRK); setA(SAK);
        setU(SP); setCRM(SCRM); setLeads(SLEADS);
      }
      setDriveReady(true);
      apiGetMembers().then(m=>{
      const members=m||[];
      setOfficeMembers(members);
      // Sync partners from office members — partners is now derived from office_members
      setU(existingPartners=>{
        return members.map((om,i)=>{
          // Try to find existing partner by email to preserve ID and color
          const existing=existingPartners.find(p=>p.email===om.email);
          return{
            id: existing?.id||om.id||uid(),
            name: om.name||om.email,
            role: om.role==='admin'?'שותף בכיר':om.role==='manager'?'מנהל':om.role==='drafter'?'שרטט':'לקוח',
            color: existing?.color||COLORS[i%COLORS.length],
            email: om.email,
            picture: om.picture||'',
            phone: existing?.phone||'',
          };
        });
      });
    }).catch(()=>{});
    }catch(e){ setDriveError('שגיאה בטעינה'); }
    finally{ setDriveSyncing(false); }
  };

  const getState=()=>({projects,tasks,docs,reqs,approvs,committees,partners,templates,crm,leads});

  const driveSave=async(state)=>{
    if(!gIsSignedIn())return;
    setDriveSyncing(true);
    try{
      const s=state||getState();
      s._savedAt=new Date().toISOString();
      await apiSave(s);
      setDriveLastSave(s._savedAt);
      setDriveError(null);
    }catch(e){ setDriveError('שגיאת שמירה'); }
    finally{ setDriveSyncing(false); }
  };

  // ── Auto-backup to Google Drive (daily) ─────────────────────────────────
  const autoBackup = async (state) => {
    try {
      const lastBackup = parseInt(localStorage.getItem('arch_last_backup') || '0');
      if (Date.now() - lastBackup < 23 * 60 * 60 * 1000) return; // max once per 23h
      if (!gIsSignedIn()) return;
      const s = state || getState();
      const blob = new Blob([JSON.stringify(s, null, 2)], {type: 'application/json'});
      const token = _gAccessToken;
      // Check for existing backup file
      const listRes = await fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='archstudio-backup.json'&fields=files(id)", {
        headers: {Authorization: 'Bearer ' + token}
      });
      const listData = await listRes.json();
      const fileId = listData.files?.[0]?.id;
      const meta = JSON.stringify({name: 'archstudio-backup.json', parents: fileId ? undefined : ['appDataFolder']});
      const form = new FormData();
      form.append('metadata', new Blob([meta], {type: 'application/json'}));
      form.append('file', blob);
      const url = fileId
        ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`
        : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&spaces=appDataFolder';
      await fetch(url, {method: fileId ? 'PATCH' : 'POST', headers: {Authorization: 'Bearer ' + token}, body: form});
      localStorage.setItem('arch_last_backup', Date.now().toString());
      console.log('✅ Auto-backup to Google Drive complete');
    } catch(e) { console.warn('Auto-backup failed:', e); }
  };

  const manualBackup = () => {
    const s = getState();
    const blob = new Blob([JSON.stringify(s, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `archstudio-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  // Auto-save on any state change
  useEffect(()=>{
    if(!driveReady||!gIsSignedIn())return;
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{const s=getState();driveSave(s);autoBackup(s);},2000);
  },[projects,tasks,docs,reqs,approvs,committees,partners,templates,crm,leads,driveReady]);

  return {
    driveReady,driveSyncing,driveLastSave,driveError,driveLoad,driveSave,
    projects,tasks,docs,reqs,approvs,committees,partners,templates,officeMembers,
    addProject:p=>setP(ps=>[...ps,{...p,id:uid(),milestones:p.milestones||[]}]),
    updProject:(id,ch)=>setP(ps=>ps.map(p=>p.id===id?{...p,...ch}:p)),
    delProject:id=>{setP(ps=>ps.filter(p=>p.id!==id));setT(ts=>ts.filter(t=>t.project_id!==id));setD(ds=>ds.filter(d=>d.project_id!==id));setR(rs=>rs.filter(r=>r.project_id!==id));setA(as=>as.filter(a=>a.project_id!==id));},
    addTask:t=>setT(ts=>[...ts,{...t,id:uid(),parent_task_id:t.parent_task_id||null,depends_on:t.depends_on||[],notes:t.notes||[],description:t.description||''}]),
    updTask:(id,ch)=>setT(ts=>{
      let updated=ts.map(t=>t.id===id?{...t,...ch}:t);

      // ── Cascade DOWN: when marking a task Done/To Do, apply same to all descendants ──
      if(ch.status){
        const cascade=(parentId,status)=>{
          updated.filter(t=>t.parent_task_id===parentId).forEach(child=>{
            updated=updated.map(t=>t.id===child.id?{...t,status}:t);
            cascade(child.id,status);
          });
        };
        cascade(id,ch.status);
      }

      // ── Cascade UP: recalculate parent status based on children ──
      if(ch.status){
        const recalcAncestors=(childId)=>{
          const child=updated.find(t=>t.id===childId);
          if(!child?.parent_task_id) return;
          const pid=child.parent_task_id;
          const siblings=updated.filter(t=>t.parent_task_id===pid);
          const allDone=siblings.every(t=>t.status==='Done');
          const allToDo=siblings.every(t=>t.status==='To Do');
          const parentStatus=allDone?'Done':allToDo?'To Do':'In Progress';
          updated=updated.map(t=>t.id===pid?{...t,status:parentStatus}:t);
          recalcAncestors(pid);
        };
        recalcAncestors(id);
      }

      // ── Check readiness: deps + subtasks all Done → auto-promote to High ──
      updated=updated.map(t=>{
        if(t.status==='To Do'||t.status==='Blocked'){
          const deps=t.depends_on||[];
          const subtasks=updated.filter(x=>x.parent_task_id===t.id);
          const depsAllDone=deps.length>0&&deps.every(did=>{const d=updated.find(x=>x.id===did);return d&&d.status==='Done';});
          const subsAllDone=subtasks.length===0||subtasks.every(x=>x.status==='Done');
          const wasReady=t._ready;
          const isReady=depsAllDone&&subsAllDone&&deps.length>0;
          if(isReady&&!wasReady) return{...t,_ready:true,priority:'High'};
          if(!isReady&&wasReady) return{...t,_ready:false};
        }
        return t;
      });

      return updated;
    }),
    batchUpdTasks:(ids,ch)=>setT(ts=>ts.map(t=>ids.includes(t.id)?{...t,...ch}:t)),
    delTask:id=>setT(ts=>{
      const toDelete=new Set([id]);
      let changed=true;
      while(changed){changed=false;ts.forEach(t=>{if(t.parent_task_id&&toDelete.has(t.parent_task_id)&&!toDelete.has(t.id)){toDelete.add(t.id);changed=true;}});}
      return ts.filter(t=>!toDelete.has(t.id));
    }),
    renameSection:(pid,o,n)=>setT(ts=>ts.map(t=>t.project_id===pid&&t.section===o?{...t,section:n}:t)),
    addDoc:d=>setD(ds=>[...ds,{...d,id:uid(),expiry:d.expiry||''}]),
    updDoc:(id,ch)=>setD(ds=>ds.map(d=>d.id===id?{...d,...ch}:d)),
    delDoc:id=>setD(ds=>ds.filter(d=>d.id!==id)),
    addReq:r=>setR(rs=>[...rs,{...r,id:uid()}]),
    updReq:(id,ch)=>setR(rs=>rs.map(r=>r.id===id?{...r,...ch}:r)),
    delReq:id=>setR(rs=>rs.filter(r=>r.id!==id)),
    addApp:a=>setA(as=>[...as,{...a,id:uid()}]),
    updApp:(id,ch)=>setA(as=>as.map(a=>a.id===id?{...a,...ch}:a)),
    delApp:id=>setA(as=>as.filter(a=>a.id!==id)),
    addCommittee:c=>setC(cs=>[...cs,{...c,id:uid()}]),
    updCommittee:(id,ch)=>setC(cs=>cs.map(c=>c.id===id?{...c,...ch}:c)),
    delCommittee:id=>setC(cs=>cs.filter(c=>c.id!==id)),
    addPartner:u=>setU(us=>[...us,{...u,id:uid(),color:COLORS[us.length%COLORS.length]}]),
    updPartner:(id,ch)=>setU(us=>us.map(u=>u.id===id?{...u,...ch}:u)),
    delPartner:id=>setU(us=>us.filter(u=>u.id!==id)),
    crm,
    addCRM:c=>setCRM(cs=>[...cs,{...c,id:uid(),project_ids:c.project_ids||[],tags:c.tags||[]}]),
    updCRM:(id,ch)=>setCRM(cs=>cs.map(c=>c.id===id?{...c,...ch}:c)),
    delCRM:id=>setCRM(cs=>cs.filter(c=>c.id!==id)),
    leads,
    addLead:l=>setLeads(ls=>[...ls,{...l,id:uid(),tasks:l.tasks||[],created:new Date().toISOString().split('T')[0]}]),
    updLead:(id,ch)=>setLeads(ls=>ls.map(l=>l.id===id?{...l,...ch}:l)),
    delLead:id=>setLeads(ls=>ls.filter(l=>l.id!==id)),
    addLeadTask:(lid,t)=>setLeads(ls=>ls.map(l=>l.id===lid?{...l,tasks:[...l.tasks,{...t,id:uid(),done:false,created:new Date().toISOString().split('T')[0]}]}:l)),
    updLeadTask:(lid,tid,ch)=>setLeads(ls=>ls.map(l=>l.id===lid?{...l,tasks:l.tasks.map(t=>t.id===tid?{...t,...ch}:t)}:l)),
    delLeadTask:(lid,tid)=>setLeads(ls=>ls.map(l=>l.id===lid?{...l,tasks:l.tasks.filter(t=>t.id!==tid)}:l)),
    saveTpl:tpl=>setTpl(ts=>[...ts,{...tpl,id:uid(),created:new Date().toISOString().split('T')[0]}]),
    manualBackup, autoBackup,
    delTpl:id=>setTpl(ts=>ts.filter(t=>t.id!==id)),
  };
}

  const V={primary:{background:'#1A1A1A',color:'white',border:'none'},accent:{background:'var(--green)',color:'white',border:'none'},outline:{background:'white',color:'#3A3A3A',border:'1px solid var(--border)'},ghost:{background:'transparent',color:'var(--text2)',border:'none'},danger:{background:'var(--red-light)',color:'var(--red)',border:'1px solid #FECACA'}};
  const S={sm:{height:30,padding:'0 10px',fontSize:12},md:{height:38,padding:'0 14px',fontSize:13},lg:{height:42,padding:'0 22px',fontSize:14}};
  return <button style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:6,fontWeight:500,borderRadius:7,cursor:'pointer',transition:'opacity .15s',...V[v],...S[sz],...sx}} onMouseOver={e=>e.currentTarget.style.opacity='.82'} onMouseOut={e=>e.currentTarget.style.opacity='1'} {...p}>{children}</button>;
};
function Av({u,size=28}){
  if(!u)return<div style={{width:size,height:size,borderRadius:'50%',background:'#E8E6E1',display:'flex',alignItems:'center',justifyContent:'center',color:'#8C8C8C',fontSize:size*.4,flexShrink:0}}>?</div>;
  return<div title={u.name} style={{width:size,height:size,borderRadius:'50%',background:u.color,display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:600,fontSize:size*.38,flexShrink:0}}>{u.name[0]}</div>;
}
const STATUS_MAP={
  'Planning':    {heb:'תכנון',      bg:'#EFF6FF',col:'#1D4ED8',dot:'#3B82F6'},
  'Permitting':  {heb:'היתרים',     bg:'#FFFBEB',col:'#B45309',dot:'#F59E0B'},
  'Under Construction':{heb:'בביצוע', bg:'#ECFDF5',col:'#065F46',dot:'#10B981'},
  'Completed':   {heb:'הושלם',      bg:'#F0FDF4',col:'#166534',dot:'#22C55E'},
  'On Hold':     {heb:'בהמתנה',     bg:'#F3F4F6',col:'#6B7280',dot:'#9CA3AF'},
};
function SBadge({status}){
  const c=STATUS_MAP[status]||{heb:status,bg:'#F3F4F6',col:'#6B7280',dot:'#9CA3AF'};
  return<span style={{display:'inline-flex',alignItems:'center',gap:5,padding:'3px 10px',borderRadius:999,fontSize:11,fontWeight:600,background:c.bg,color:c.col}}><span style={{width:6,height:6,borderRadius:'50%',background:c.dot,display:'inline-block'}}/>{c.heb}</span>;
}
function Modal({open,onClose,title,children,wide,xl}){
  if(!open)return null;
  return<div onClick={onClose} style={{position:'fixed',inset:0,zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:16,background:'rgba(0,0,0,.45)'}}>
    <div onClick={e=>e.stopPropagation()} className="fade" style={{background:'white',borderRadius:14,boxShadow:'0 20px 60px rgba(0,0,0,.2)',width:'100%',maxWidth:xl?900:wide?640:500,maxHeight:'92vh',display:'flex',flexDirection:'column'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 22px',borderBottom:'1px solid #F0EDE8',flexShrink:0}}>
        <h2 style={{fontSize:16,fontWeight:600}}>{title}</h2>
        <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',fontSize:22,color:'#8C8C8C',lineHeight:1,padding:4}}>×</button>
      </div>
      <div style={{padding:22,overflowY:'auto',flex:1}}>{children}</div>
    </div>
  </div>;
}

// ─── Task Modal (all inline) ──────────────────────────────────────────────────
function TaskModal({task,allTasks,allProjects,partners,onUpdate,onClose,onJumpToTask,db}){
  const [saved,setSaved]=useState(false);
  const showSaved=()=>{setSaved(true);setTimeout(()=>setSaved(false),2000);};
  const [noteText,setNoteText]=useState('');
  const [depSearch,setDepSearch]=useState('');
  const [newSubTitle,setNewSubTitle]=useState('');
  const subtasks=allTasks.filter(t=>t.parent_task_id===task.id);
  const subDone=subtasks.filter(t=>t.status==='Done').length;
  const addSubtask=()=>{if(!newSubTitle.trim()||!db)return;db.addTask({project_id:task.project_id,title:newSubTitle.trim(),section:task.section,status:'To Do',priority:task.priority||'Medium',parent_task_id:task.id,depends_on:[],notes:[],description:''});setNewSubTitle('');};
  const [showDep,setShowDep]=useState(false);
  const u=(k,v)=>{onUpdate(task.id,{[k]:v});showSaved();};
  const isBlocked=(task.depends_on||[]).some(id=>{const d=allTasks.find(x=>x.id===id);return d&&d.status!=='Done';});
  const depTasks=allTasks.filter(t=>(task.depends_on||[]).includes(t.id));
  const candidates=allTasks.filter(t=>t.id!==task.id&&!(task.depends_on||[]).includes(t.id)&&(!depSearch||t.title.includes(depSearch)||(allProjects.find(p=>p.id===t.project_id)||{}).name?.includes(depSearch)));
  const addDep=id=>{u('depends_on',[...(task.depends_on||[]),id]);setDepSearch('');};
  const remDep=id=>u('depends_on',(task.depends_on||[]).filter(d=>d!==id));
  const addNote=()=>{if(!noteText.trim())return;u('notes',[...(task.notes||[]),{id:uid(),text:noteText.trim(),date:new Date().toISOString().split('T')[0],author_id:'u1'}]);setNoteText('');};
  const delNote=nid=>u('notes',(task.notes||[]).filter(n=>n.id!==nid));
  const proj=allProjects.find(p=>p.id===task.project_id);
  const assignee=partners.find(p=>p.id===task.assignee_id);
  const PRI={'High':'#EF4444','Medium':'#F59E0B','Low':'#9CA3AF'};

  const FR=({label,children})=>(
    <div style={{display:'flex',alignItems:'flex-start',gap:10,padding:'7px 0',borderBottom:'1px solid #F7F6F3'}}>
      <span style={{fontSize:11,fontWeight:600,color:'#B0B0B0',textTransform:'uppercase',letterSpacing:'.04em',minWidth:76,paddingTop:3,flexShrink:0}}>{label}</span>
      <div style={{flex:1}}>{children}</div>
    </div>
  );

  // Editable title/desc with contentEditable
  const TitleRef=useRef();const DescRef=useRef();
  useEffect(()=>{if(TitleRef.current)TitleRef.current.innerText=task.title||'';if(DescRef.current)DescRef.current.innerText=task.description||'';},[task.id]);

  return<Modal open onClose={onClose} title={task.title} xl>
    {saved&&<div style={{textAlign:'center',padding:'4px',background:'#ECFDF5',borderBottom:'1px solid #D1FAE5',fontSize:12,color:'#065F46',fontWeight:600}}>✓ נשמר</div>}
    <div style={{display:'grid',gridTemplateColumns:'1fr 270px',gap:24}}>
      <div>
        {/* Inline title */}
        <div ref={TitleRef} contentEditable suppressContentEditableWarning
          onBlur={e=>{const v=e.target.innerText.trim();if(v&&v!==task.title)u('title',v);}}
          onKeyDown={e=>e.key==='Enter'&&(e.preventDefault(),e.target.blur())}
          style={{fontSize:20,fontWeight:600,outline:'none',marginBottom:10,lineHeight:1.4,cursor:'text',borderRadius:4,minHeight:28}}/>
        {/* Inline description */}
        <div ref={DescRef} contentEditable suppressContentEditableWarning
          onBlur={e=>{const v=e.target.innerText.trim();if(v!==task.description)u('description',v);}}
          data-placeholder="הוסף תיאור..."
          style={{fontSize:13,color:'#4A4A4A',lineHeight:1.7,outline:'none',marginBottom:18,minHeight:36,background:'#F7F6F3',borderRadius:7,padding:'8px 10px',cursor:'text'}}/>

        {/* Dependencies */}
        <div style={{marginBottom:20}}>
          <div style={{fontSize:11,fontWeight:700,color:'#8C8C8C',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:8}}>תלויות</div>
          {depTasks.length===0&&<p style={{fontSize:12,color:'#B0B0B0',fontStyle:'italic',marginBottom:8}}>אין תלויות</p>}
          {depTasks.map(dep=>{
            const dp=allProjects.find(p=>p.id===dep.project_id);
            const bl=dep.status!=='Done';
            return<div key={dep.id} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 10px',background:bl?'#FEF2F2':'#F0FDF4',borderRadius:7,marginBottom:5,border:'1px solid '+(bl?'#FECACA':'#BBF7D0')}}>
              <span>{bl?'🔴':'✅'}</span><span style={{flex:1,fontSize:13,fontWeight:500}}>{dep.title}</span>
              <span style={{fontSize:11,color:'#8C8C8C'}}>{dp?.name}</span>
              <span style={{fontSize:11,fontWeight:600,color:bl?'#DC2626':'#059669'}}>{bl?'פתוח':'הושלם'}</span>
              <button onClick={()=>remDep(dep.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#D0CEC9',fontSize:14}} onMouseOver={e=>e.target.style.color='#EF4444'} onMouseOut={e=>e.target.style.color='#D0CEC9'}>×</button>
            </div>;
          })}
          {isBlocked&&<div style={{background:'#FFF7ED',border:'1px solid #FED7AA',borderRadius:9,padding:'10px 12px',marginBottom:8}}>
            <div style={{fontSize:12,color:'#C2410C',fontWeight:700,marginBottom:8}}>⛔ משימה חסומה — יש תלויות פתוחות</div>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {(task.depends_on||[]).filter(depId=>{const d=allTasks.find(x=>x.id===depId);return d&&d.status!=='Done';}).map(depId=>{
                const dep=allTasks.find(x=>x.id===depId);
                if(!dep)return null;
                const dp=allProjects.find(p=>p.id===dep.project_id);
                return<div key={depId} style={{display:'flex',alignItems:'center',gap:8,background:'white',borderRadius:7,padding:'7px 10px',border:'1px solid #FED7AA'}}>
                  <span style={{fontSize:13}}>🔴</span>
                  <span style={{flex:1,fontSize:12,fontWeight:500}}>{dep.title}</span>
                  {dp&&<span style={{fontSize:11,color:'#9C9C9C'}}>{dp.name}</span>}
                  <button onClick={()=>{onClose();setTimeout(()=>onJumpToTask&&onJumpToTask(dep.id),100);}} style={{height:26,padding:'0 10px',background:'#C2410C',color:'white',border:'none',borderRadius:6,fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'Heebo,sans-serif',whiteSpace:'nowrap'}}>עבור למשימה →</button>
                </div>;
              })}
            </div>
          </div>}
          <div style={{position:'relative'}}>
            <Btn v="outline" sz="sm" sx={{borderStyle:'dashed'}} onClick={()=>setShowDep(!showDep)}>+ הוסף תלות</Btn>
            {showDep&&<div style={{position:'absolute',top:36,right:0,zIndex:10,background:'white',border:'1px solid #E8E6E1',borderRadius:10,boxShadow:'0 4px 20px rgba(0,0,0,.12)',width:340,padding:10}}>
              <input value={depSearch} onChange={e=>setDepSearch(e.target.value)} placeholder="חפש משימה מכל פרויקט..." autoFocus
                style={{width:'100%',height:34,padding:'0 10px',border:'1px solid #E8E6E1',borderRadius:6,fontSize:13,marginBottom:8,fontFamily:'Heebo,sans-serif'}}/>
              <div style={{maxHeight:200,overflowY:'auto'}}>
                {candidates.slice(0,20).map(t=>{
                  const tp=allProjects.find(p=>p.id===t.project_id);
                  return<div key={t.id} onClick={()=>{addDep(t.id);setShowDep(false);}} className="hr"
                    style={{display:'flex',alignItems:'center',gap:8,padding:'7px 8px',borderRadius:6,cursor:'pointer'}}>
                    <span style={{flex:1,fontSize:13}}>{t.title}</span>
                    <span style={{fontSize:11,color:'#8C8C8C',flexShrink:0}}>{tp?.name}</span>
                    <span style={{fontSize:11,padding:'1px 6px',borderRadius:999,background:t.status==='Done'?'#ECFDF5':'#F3F4F6',color:t.status==='Done'?'#059669':'#6B7280'}}>{t.status==='Done'?'הושלם':'פתוח'}</span>
                  </div>;
                })}
                {candidates.length===0&&<p style={{fontSize:12,color:'#B0B0B0',padding:8,textAlign:'center'}}>אין תוצאות</p>}
              </div>
            </div>}
          </div>
        </div>

        {/* Notes */}
        <div>
          <div style={{fontSize:11,fontWeight:700,color:'#8C8C8C',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:8}}>הערות</div>
          {(task.notes||[]).map(n=>{
            const auth=partners.find(p=>p.id===n.author_id);
            return<div key={n.id} style={{display:'flex',gap:8,marginBottom:10}}>
              <Av u={auth} size={26}/>
              <div style={{flex:1,background:'#F7F6F3',borderRadius:8,padding:'8px 10px'}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                  <span style={{fontSize:12,fontWeight:600}}>{auth?.name||'לא ידוע'}</span>
                  <div style={{display:'flex',gap:6}}><span style={{fontSize:11,color:'#8C8C8C'}}>{n.date}</span>
                    <button onClick={()=>delNote(n.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#D0CEC9',fontSize:13}} onMouseOver={e=>e.target.style.color='#EF4444'} onMouseOut={e=>e.target.style.color='#D0CEC9'}>×</button>
                  </div>
                </div>
                <p style={{fontSize:13,lineHeight:1.5}}>{n.text}</p>
              </div>
            </div>;
          })}
          <div style={{display:'flex',gap:8,marginTop:4}}>
            <input value={noteText} onChange={e=>setNoteText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addNote()}
              placeholder="הוסף הערה..." style={{flex:1,height:36,padding:'0 10px',border:'1px solid #E8E6E1',borderRadius:7,fontSize:13,fontFamily:'Heebo,sans-serif'}}/>
            <Btn sz="sm" v="accent" onClick={addNote}>שלח</Btn>
          </div>
        </div>
      </div>

      {/* RIGHT — all inline dropdowns/inputs */}
      <div style={{borderRight:'1px solid #F0EDE8',paddingRight:20}}>
        {[
          {label:'סטטוס',content:<div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
            {[{id:'To Do',label:'להתחלה',bg:'#F3F4F6',col:'#4B5563',activeBg:'#1A1A1A',activeCol:'white'},{id:'In Progress',label:'בתהליך',bg:'#FFFBEB',col:'#B45309',activeBg:'#F59E0B',activeCol:'white'},{id:'Done',label:'הושלם',bg:'#ECFDF5',col:'#065F46',activeBg:'#3D7A5A',activeCol:'white'}].map(s=>{
              const isActive=task.status===s.id;
              const cantDone=s.id==='Done'&&isBlocked;
              return<button key={s.id} onClick={()=>!cantDone&&u('status',s.id)} title={cantDone?'חסום — יש תלויות פתוחות':''} style={{height:28,padding:'0 10px',borderRadius:7,border:'none',fontSize:12,fontWeight:isActive?700:500,cursor:cantDone?'not-allowed':'pointer',background:isActive?s.activeBg:s.bg,color:isActive?s.activeCol:s.col,opacity:cantDone?.4:1,fontFamily:'Heebo,sans-serif',transition:'all .15s',display:'flex',alignItems:'center',gap:4}}>
                {isActive&&'✓ '}{s.label}{s.id==='Done'&&isBlocked&&' ⛔'}
              </button>;
            })}
          </div>},
          {label:'עדיפות',content:<div style={{display:'flex',gap:5}}>{[{id:'High',label:'גבוהה',bg:'#FEE2E2',activeBg:'#EF4444'},{id:'Medium',label:'בינונית',bg:'#FEF9C3',activeBg:'#EAB308'},{id:'Low',label:'נמוכה',bg:'#F3F4F6',activeBg:'#D1D5DB'}].map(p=>{const isA=(task.priority||'Medium')===p.id;return<button key={p.id} onClick={()=>u('priority',p.id)} style={{flex:1,height:28,borderRadius:7,border:'none',fontSize:11,fontWeight:isA?700:400,cursor:'pointer',background:isA?p.activeBg:p.bg,color:'#1A1A1A',fontFamily:'Heebo,sans-serif',transition:'all .15s',whiteSpace:'nowrap'}}>{p.label}</button>;})}</div>},
          {label:'דד ליין',content:<div style={{display:'flex',gap:5,alignItems:'center'}}><input type="date" value={task.deadline||''} onChange={e=>u('deadline',e.target.value)} style={{flex:1,height:30,padding:'0 8px',border:'1px solid #E8E6E1',borderRadius:6,fontSize:13,background:'white',fontFamily:'Heebo,sans-serif'}}/>{task.deadline&&<button onClick={()=>u('deadline','')} title='הסר תאריך' style={{height:30,width:30,borderRadius:6,border:'1px solid #E8E6E1',background:'white',cursor:'pointer',fontSize:14,color:'#9C9C9C',flexShrink:0}}>×</button>}</div>},
          {label:'אחראי',content:<><select value={task.assignee_id||''} onChange={e=>u('assignee_id',e.target.value)} style={{width:'100%',height:30,padding:'0 8px',border:'1px solid #E8E6E1',borderRadius:6,fontSize:13,background:'white',fontFamily:'Heebo,sans-serif'}}><option value="">— ללא שיוך —</option>{partners.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>{assignee&&<div style={{display:'flex',alignItems:'center',gap:6,marginTop:5}}><Av u={assignee} size={22}/><span style={{fontSize:12}}>{assignee.name}</span></div>}</>},
          {label:'קטגוריה',content:<input value={task.section||''} onChange={e=>u('section',e.target.value)} placeholder="הנדסה, עיצוב..." style={{width:'100%',height:30,padding:'0 8px',border:'1px solid #E8E6E1',borderRadius:6,fontSize:13,background:'white',fontFamily:'Heebo,sans-serif'}}/>},
          {label:'פרויקט',content:<span style={{fontSize:13}}>{proj?.name||'—'}</span>},
          {label:'תת של',content:(<div>
            {task.parent_task_id
              ?<div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:12}}>{allTasks.find(t=>t.id===task.parent_task_id)?.title||'—'}</span>
                  <button onClick={()=>u('parent_task_id',null)} style={{fontSize:11,background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:5,padding:'2px 8px',cursor:'pointer',color:'#DC2626',fontFamily:'Heebo,sans-serif'}}>הסר</button>
                </div>
              :<select onChange={e=>{if(e.target.value)u('parent_task_id',e.target.value);}} defaultValue=""
                  style={{width:'100%',height:30,padding:'0 8px',border:'1px solid #E8E6E1',borderRadius:6,fontSize:12,background:'white',fontFamily:'Heebo,sans-serif'}}>
                  <option value="">— עצמאית —</option>
                  {allTasks.filter(t=>t.id!==task.id&&t.project_id===task.project_id&&!t.parent_task_id).map(t=><option key={t.id} value={t.id}>{t.title}</option>)}
                </select>}
          </div>)},
        ].map(({label,content})=>(
          <div key={label} style={{display:'flex',alignItems:'flex-start',gap:8,padding:'7px 0',borderBottom:'1px solid #F7F6F3'}}>
            <span style={{fontSize:11,fontWeight:600,color:'#B0B0B0',textTransform:'uppercase',letterSpacing:'.04em',minWidth:70,paddingTop:3,flexShrink:0}}>{label}</span>
            <div style={{flex:1}}>{content}</div>
          </div>
        ))}
        <div style={{marginTop:14}}>
          <div style={{fontSize:11,fontWeight:600,color:'#8C8C8C',textTransform:'uppercase',marginBottom:8}}>קבצים</div>
          <div style={{border:'2px dashed #E8E6E1',borderRadius:8,padding:10,textAlign:'center',cursor:'pointer',fontSize:12,color:'#B0B0B0'}}
            onClick={()=>alert('העלאת קבצים תהיה זמינה עם חיבור לשרת')}>📎 לחץ להעלאה</div>
        </div>
      </div>
    </div>
  </Modal>;
}

// FLOW VIEW — Dependency graph + Kanban
// ═══════════════════════════════════════════════════════════════════════════

// ── Kanban ────────────────────────────────────────────────────────────────
function KanbanView({tasks,allTasks,allProjects,partners,db,pid,onOpenTask}){
  const COLS=[
    {id:'To Do',   label:'להתחלה', color:'#6B7280', bg:'#F9FAFB'},
    {id:'In Progress', label:'בתהליך', color:'#B45309', bg:'#FFFBEB'},
    {id:'Done',    label:'הושלם',  color:'#065F46', bg:'#F0FDF4'},
  ];
  const [dragging,setDragging]=useState(null);
  const [over,setOver]=useState(null);
  const blocked=t=>(t.depends_on||[]).some(id=>{const d=allTasks.find(x=>x.id===id);return d&&d.status!=='Done';});
  const PRI={High:'#EF4444',Medium:'#F59E0B',Low:'#D1D5DB'};

  const drop=colId=>{
    if(!dragging)return;
    if(colId==='Done'&&blocked(dragging))return;
    db.updTask(dragging.id,{status:colId});
    setDragging(null);setOver(null);
  };

  return<div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,height:'100%',minHeight:500}}>
    {COLS.map(col=>{
      const colTasks=tasks.filter(t=>t.status===col.id);
      const isOver=over===col.id;
      return<div key={col.id}
        onDragOver={e=>{e.preventDefault();setOver(col.id);}}
        onDragLeave={()=>setOver(null)}
        onDrop={()=>drop(col.id)}
        style={{background:isOver?col.bg:'#F5F4F0',borderRadius:12,border:'2px solid '+(isOver?col.color:'transparent'),transition:'all .15s',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* Column header */}
        <div style={{padding:'12px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid rgba(0,0,0,.06)'}}>
          <div style={{display:'flex',alignItems:'center',gap:7}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:col.color}}/>
            <span style={{fontSize:12,fontWeight:700,color:col.color,textTransform:'uppercase',letterSpacing:'.06em'}}>{col.label}</span>
          </div>
          <span style={{fontSize:11,fontWeight:600,color:'#9C9C9C',background:'rgba(0,0,0,.06)',borderRadius:999,padding:'1px 7px'}}>{colTasks.length}</span>
        </div>
        {/* Cards */}
        <div style={{flex:1,padding:'10px 10px',display:'flex',flexDirection:'column',gap:8,overflowY:'auto'}}>
          {colTasks.map(t=>{
            const asgn=partners.find(p=>p.id===t.assignee_id);
            const bl=blocked(t);
            const od=t.deadline&&new Date(t.deadline)<new Date()&&t.status!=='Done';
            return<div key={t.id}
              draggable={!bl}
              onDragStart={()=>setDragging(t)}
              onDragEnd={()=>{setDragging(null);setOver(null);}}
              onClick={()=>onOpenTask(t.id)}
              style={{background:'white',borderRadius:9,border:'1px solid '+(bl?'#FECACA':'#E8E5DF'),padding:'10px 12px',cursor:bl?'not-allowed':'grab',boxShadow:'0 1px 3px rgba(0,0,0,.05)',transition:'all .15s',opacity:dragging?.id===t.id?.4:1,userSelect:'none'}}
              onMouseOver={e=>!bl&&(e.currentTarget.style.boxShadow='0 4px 12px rgba(0,0,0,.10)')}
              onMouseOut={e=>e.currentTarget.style.boxShadow='0 1px 3px rgba(0,0,0,.05)'}>

              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:6}}>

                  {bl&&<span style={{fontSize:10,color:'#EF4444',fontWeight:600}}>⛔</span>}
                  {od&&<span style={{fontSize:10,color:'#EF4444',fontWeight:600}}>⚠️ {fmtD(t.deadline)}</span>}
                  {(t.notes||[]).length>0&&<span style={{fontSize:10,color:'#9C9C9C'}}>💬{t.notes.length}</span>}
                </div>
                {asgn&&<div style={{width:22,height:22,borderRadius:'50%',background:asgn.color,display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontSize:10,fontWeight:700,flexShrink:0}}>{asgn.name[0]}</div>}
              </div>
            </div>;
          })}
          {colTasks.length===0&&<div style={{textAlign:'center',padding:'24px 8px',color:'#C0C0C0',fontSize:12,fontStyle:'italic'}}>גרור משימות לכאן</div>}
        </div>
      </div>;
    })}
  </div>;
}

// ── Flow Graph ────────────────────────────────────────────────────────────
function FlowView({tasks,allTasks,allProjects,partners,db,onOpenTask}){
  const svgRef=useRef();
  const [hoverId,setHoverId]=useState(null);
  const [openId,setOpenId]=useState(null);

  // ── Layout algorithm ───────────────────────────────────────────────────
  // Topological sort → assign columns (depth), then rows per section
  const taskMap=Object.fromEntries(tasks.map(t=>[t.id,t]));

  // Compute depth (column) for each task using longest path from sources
  const depth={};
  const getDepth=id=>{
    if(depth[id]!==undefined)return depth[id];
    const t=taskMap[id];
    if(!t)return 0;
    const deps=(t.depends_on||[]).filter(d=>taskMap[d]);
    if(deps.length===0){depth[id]=0;return 0;}
    const d=Math.max(...deps.map(d=>getDepth(d)))+1;
    depth[id]=d;return d;
  };
  tasks.forEach(t=>getDepth(t.id));
  const maxDepth=Math.max(0,...Object.values(depth));

  // Group by depth → columns; within column sort by section
  const cols=Array.from({length:maxDepth+1},(_,i)=>
    tasks.filter(t=>depth[t.id]===i).sort((a,b)=>(a.section||'').localeCompare(b.section||''))
  );

  // Node dimensions
  const NW=180,NH=64,HGAP=80,VGAP=20,PAD=24;
  const colX=ci=>PAD+ci*(NW+HGAP);
  const colNodes=cols.map(col=>{
    let y=PAD;
    return col.map(t=>{const node={...t,x:0,y};y+=NH+VGAP;return node;});
  });
  // assign x
  colNodes.forEach((col,ci)=>col.forEach(n=>n.x=colX(ci)));
  const allNodes=colNodes.flat();
  const nodeMap=Object.fromEntries(allNodes.map(n=>[n.id,n]));

  // SVG size
  const svgW=cols.length*(NW+HGAP)+PAD*2;
  const svgH=Math.max(...colNodes.map(col=>col.reduce((s,n)=>s+NH+VGAP,PAD)))+PAD;

  // Critical path — find the path from rightmost blocked node backward
  const isBlocked=id=>{const t=taskMap[id];return(t?.depends_on||[]).some(d=>taskMap[d]&&taskMap[d].status!=='Done');};
  const criticalIds=new Set();
  // mark all not-done tasks that block others
  tasks.forEach(t=>{
    if(t.status!=='Done'){
      (t.depends_on||[]).forEach(depId=>{
        if(taskMap[depId]&&taskMap[depId].status!=='Done'){
          criticalIds.add(depId);criticalIds.add(t.id);
        }
      });
    }
  });

  // Edge colors
  const edgeColor=(fromId,toId)=>{
    if(criticalIds.has(fromId)&&criticalIds.has(toId))return '#EF4444';
    const from=taskMap[fromId];
    if(from?.status==='Done')return '#BBF7D0';
    return '#D1D5DB';
  };

  const nodeColor=t=>{
    if(t.status==='Done')return{bg:'#ECFDF5',border:'#6EE7B7',text:'#065F46'};
    if(criticalIds.has(t.id))return{bg:'#FEF2F2',border:'#FCA5A5',text:'#991B1B'};
    if(t.status==='In Progress')return{bg:'#FFFBEB',border:'#FCD34D',text:'#92400E'};
    return{bg:'white',border:'#E8E5DF',text:'#1A1A1A'};
  };
  const PRI={High:'#EF4444',Medium:'#F59E0B',Low:'#D1D5DB'};

  const openTask=openId?allTasks.find(t=>t.id===openId):null;

  return<div>
    {openTask&&<TaskModal task={openTask} allTasks={allTasks} allProjects={allProjects} partners={partners}
      onUpdate={db.updTask} onClose={()=>setOpenId(null)} onJumpToTask={id=>setOpenId(id)} db={db}/>}

    {/* Legend */}
    <div style={{display:'flex',gap:16,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
      {[{bg:'#ECFDF5',border:'#6EE7B7',l:'הושלם'},{bg:'#FFFBEB',border:'#FCD34D',l:'בתהליך'},{bg:'white',border:'#E8E5DF',l:'להתחלה'},{bg:'#FEF2F2',border:'#FCA5A5',l:'נתיב קריטי 🔴'}].map(({bg,border,l})=>
        <div key={l} style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'#6B6B6B'}}>
          <div style={{width:14,height:14,borderRadius:3,background:bg,border:'2px solid '+border}}/>
          {l}
        </div>
      )}
      <div style={{flex:1}}/>
      <span style={{fontSize:11,color:'#9C9C9C'}}>לחץ על משימה לפתיחה • גרור בקנבן</span>
    </div>

    {tasks.length===0&&<div style={{background:'white',border:'1px solid var(--border)',borderRadius:12,padding:60,textAlign:'center',color:'#9C9C9C'}}><div style={{fontSize:36,marginBottom:8}}>🗺</div><div>אין משימות — הוסף משימות ברשימה</div></div>}

    {tasks.length>0&&<div style={{overflowX:'auto',overflowY:'auto',background:'white',border:'1px solid var(--border)',borderRadius:14,padding:8}}>
      <svg ref={svgRef} width={svgW} height={svgH} style={{display:'block'}}>
        <defs>
          <marker id="arr-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0,0 L0,6 L8,3 z" fill="#D1D5DB"/>
          </marker>
          <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0,0 L0,6 L8,3 z" fill="#EF4444"/>
          </marker>
          <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0,0 L0,6 L8,3 z" fill="#6EE7B7"/>
          </marker>
        </defs>

        {/* Section swimlane backgrounds */}
        {(()=>{
          const sections=[...new Set(tasks.map(t=>t.section||''))];
          return sections.map((sec,si)=>{
            const secNodes=allNodes.filter(n=>(n.section||'')===sec);
            if(!secNodes.length)return null;
            const minY=Math.min(...secNodes.map(n=>n.y))-8;
            const maxY=Math.max(...secNodes.map(n=>n.y+NH))+8;
            return<g key={sec}>
              <rect x={0} y={minY} width={svgW} height={maxY-minY} fill={si%2===0?'#FAFAF8':'white'} rx={0}/>
              {sec&&<text x={svgW-8} y={minY+14} textAnchor="end" fontSize={10} fill="#C0C0C0" fontFamily="Heebo,sans-serif" fontWeight="600">{sec}</text>}
            </g>;
          });
        })()}

        {/* Edges */}
        {tasks.map(t=>
          (t.depends_on||[]).filter(depId=>nodeMap[depId]).map(depId=>{
            const from=nodeMap[depId],to=nodeMap[t.id];
            const x1=from.x+NW,y1=from.y+NH/2;
            const x2=to.x,y2=to.y+NH/2;
            const mx=(x1+x2)/2;
            const ec=edgeColor(depId,t.id);
            const markerId=ec==='#EF4444'?'arr-red':ec==='#BBF7D0'?'arr-green':'arr-gray';
            const isHov=hoverId===t.id||hoverId===depId;
            return<path key={depId+'-'+t.id}
              d={`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`}
              fill="none" stroke={ec} strokeWidth={isHov?2.5:1.5}
              strokeDasharray={ec==='#BBF7D0'?'none':'none'}
              markerEnd={`url(#${markerId})`}
              style={{transition:'stroke-width .15s'}}
            />;
          })
        )}

        {/* Nodes */}
        {allNodes.map(t=>{
          const c=nodeColor(t);
          const asgn=partners.find(p=>p.id===t.assignee_id);
          const isHov=hoverId===t.id;
          return<g key={t.id} style={{cursor:'pointer'}}
            onMouseEnter={()=>setHoverId(t.id)}
            onMouseLeave={()=>setHoverId(null)}
            onClick={()=>setOpenId(t.id)}>
            <rect x={t.x} y={t.y} width={NW} height={NH} rx={9}
              fill={c.bg} stroke={isHov?'#3D7A5A':c.border} strokeWidth={isHov?2:1.5}
              style={{filter:isHov?'drop-shadow(0 4px 8px rgba(0,0,0,.12))':'none',transition:'all .15s'}}/>
            {/* Priority dot */}
            <circle cx={t.x+12} cy={t.y+14} r={4} fill={PRI[t.priority||'Medium']}/>
            {/* Title */}
            <foreignObject x={t.x+20} y={t.y+4} width={NW-32} height={32}>
              <div xmlns="http://www.w3.org/1999/xhtml" style={{fontSize:12,fontWeight:600,color:c.text,lineHeight:'1.3',overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',direction:'rtl',fontFamily:'Heebo,sans-serif'}}>{t.title}</div>
            </foreignObject>
            {/* Bottom row */}
            {asgn&&<circle cx={t.x+NW-14} cy={t.y+NH-14} r={10} fill={asgn.color}/>}
            {asgn&&<text x={t.x+NW-14} y={t.y+NH-10} textAnchor="middle" fontSize={9} fill="white" fontFamily="Heebo,sans-serif" fontWeight="700">{asgn.name[0]}</text>}
            {t.deadline&&<text x={t.x+8} y={t.y+NH-8} fontSize={9} fill={new Date(t.deadline)<new Date()&&t.status!=='Done'?'#EF4444':'#9C9C9C'} fontFamily="Heebo,sans-serif">{fmtD(t.deadline)}</text>}
            {/* Done checkmark */}
            {t.status==='Done'&&<text x={t.x+NW-28} y={t.y+16} fontSize={12} fill="#3D7A5A">✓</text>}
          </g>;
        })}
      </svg>
    </div>}
  </div>;
}

// ─── Tasks Tab ────────────────────────────────────────────────────────────────
function TasksTab({tasks,pid,allTasks,allProjs,partners,db}){
  const [newTitle,setNT]=useState('');
  const [addingIn,setAI]=useState(null);     // section key
  const [addSubIn,setASI]=useState(null);    // parent task id
  const [newSubTitle,setNST]=useState('');
  const [secInput,setSI]=useState('');
  const [extras,setExt]=useState([]);
  const [coll,setColl]=useState({});
  const [openId,setOID]=useState(null);
  const [showSecDep,setShowSecDep]=useState(null); // section name being edited for deps
  const [expanded,setExpanded]=useState({});
  const [editSec,setES]=useState(null);
  const [editingId,setEditingId]=useState(null);
  const [editTitle,setEditTitle]=useState('');

  const jumpToTask=id=>{setOID(id);};
  const toggleExpand=id=>setExpanded(e=>({...e,[id]:!e[id]}));

  // Only top-level tasks (no parent) belong to sections
  const myTasks=tasks.filter(t=>!t.parent_task_id);
  const dbSecs=Array.from(new Set(myTasks.map(t=>t.section||'')));
  const sections=Array.from(new Set([...dbSecs,...extras]));
  const bySec=s=>myTasks.filter(t=>(t.section||'')===s);

  // ── Section (category) helpers ────────────────────────────────────────────
  const proj=allProjs.find(p=>p.id===pid)||{};
  const secDeps=proj.section_deps||{};  // { 'secName': ['depSec1', 'depSec2'] }

  // Is a section fully done? (all tasks + subtasks Done recursively)
  const getAllDescendants=(taskId)=>{
    const children=allTasks.filter(t=>t.parent_task_id===taskId);
    return [taskId,...children.flatMap(ch=>getAllDescendants(ch.id))];
  };
  const isSecDone=sec=>{
    const ts=bySec(sec);
    if(ts.length===0) return false;
    const allIds=ts.flatMap(t=>getAllDescendants(t.id));
    return allIds.every(id=>{
      const t=allTasks.find(x=>x.id===id);
      return t&&t.status==='Done';
    });
  };

  // Are a section's dependencies all done?
  const isSecDepsMet=sec=>{
    const deps=secDeps[sec]||[];
    if(deps.length===0)return false; // no deps = no readiness indicator needed
    return deps.every(d=>isSecDone(d));
  };

  // Toggle all tasks in a section to Done or back to To Do
  // updTask now cascades down to subtasks and recalcs parents automatically
  const toggleSecDone=sec=>{
    const ts=bySec(sec);
    if(ts.length===0) return;
    // Use isSecDone which checks all descendants
    const allDone=isSecDone(sec);
    const newStatus=allDone?'To Do':'Done';
    // Only need to call updTask on top-level tasks — cascade handles the rest
    ts.forEach(t=>db.updTask(t.id,{status:newStatus}));
  };

  // Save section deps
  const saveSecDep=(sec,deps)=>{
    const newDeps={...secDeps,[sec]:deps};
    db.updProject(pid,{section_deps:newDeps});
  };

  const blocked=t=>(t.depends_on||[]).some(id=>{const d=allTasks.find(x=>x.id===id);return d&&d.status!=='Done';});
  const cycle=t=>{
    if(blocked(t)&&t.status!=='Done')return;
    const nx={'To Do':'In Progress','In Progress':'Done','Done':'To Do'};
    const ns=nx[t.status];
    if(ns==='Done'&&blocked(t))return;
    db.updTask(t.id,{status:ns});
  };

  const [newSec,setNewSec]=useState('');
  const addTask=sec=>{if(!newTitle.trim())return;const finalSec=sec||newSec||undefined;db.addTask({project_id:pid,title:newTitle.trim(),section:finalSec,status:'To Do',priority:'Medium',parent_task_id:null});setNT('');setAI(null);};
  const addSubtask=parentId=>{if(!newSubTitle.trim())return;const p=allTasks.find(t=>t.id===parentId);db.addTask({project_id:pid,title:newSubTitle.trim(),section:p?.section||undefined,status:'To Do',priority:p?.priority||'Medium',parent_task_id:parentId,depends_on:[],notes:[],description:''});setNST('');setASI(null);};
  const addSec=()=>{if(!secInput.trim())return;setExt(e=>[...e,secInput.trim()]);setSI('');};
  const renameSec=(o,n)=>{if(n.trim()&&n.trim()!==o){db.renameSection(pid,o,n.trim());setExt(e=>e.map(s=>s===o?n.trim():s));}setES(null);};

  const PRI={'Low':'#9CA3AF','Medium':'#F59E0B','High':'#EF4444'};
  const BD={'To Do':'#D0CEC9','In Progress':'#F59E0B','Done':'#4a7c5e'};
  const BG={'To Do':'white','In Progress':'#FFFBEB','Done':'#4a7c5e'};

  const openTask=openId?allTasks.find(t=>t.id===openId):null;

  // ── Recursive TaskRow ────────────────────────────────────────────────────
  const TaskRow=({task,depth=0})=>{
    const bl=blocked(task);
    const asgn=partners.find(p=>p.id===task.assignee_id);
    const children=allTasks.filter(t=>t.parent_task_id===task.id);
    const hasChildren=children.length>0;
    const isExpanded=expanded[task.id]!==false; // default open
    const childDone=children.filter(t=>t.status==='Done').length;
    const allChildDone=hasChildren&&childDone===children.length;
    const anyChildDone=hasChildren&&childDone>0;
    // Ready to execute: has dependencies, all deps Done, all subtasks Done, not yet started
    const deps=task.depends_on||[];
    const isReady=task._ready===true&&(task.status==='To Do'||task.status==='Blocked');

    // indent via depth
    const indent=depth*18;

    return<div>
      {/* Row */}
      <div className="hr" style={{display:'flex',alignItems:'center',gap:6,padding:`6px 12px 6px ${12+indent}px`,borderRadius:depth===0?7:0,cursor:'pointer',borderTop:depth>0?'1px solid #F8F7F5':'none',background:depth>0?'#FAFAF8':'white'}}
        onClick={()=>setOID(task.id)}>

        {/* Expand arrow */}
        {hasChildren
          ?<button onClick={e=>{e.stopPropagation();toggleExpand(task.id);}}
              style={{background:'none',border:'none',cursor:'pointer',color:'#9C9C9C',fontSize:10,padding:'0 1px',flexShrink:0,transition:'transform .15s',transform:isExpanded?'rotate(0deg)':'rotate(-90deg)',lineHeight:1}}>▼</button>
          :<div style={{width:14,flexShrink:0}}/>}

        {/* Status circle */}
        <div onClick={e=>{e.stopPropagation();!bl&&cycle(task);}}
          style={{width:depth===0?20:16,height:depth===0?20:16,borderRadius:'50%',border:'2px solid '+BD[task.status],background:BG[task.status],flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',cursor:bl?'not-allowed':'pointer',opacity:bl?.5:1,transition:'all .15s'}}>
          {task.status==='Done'&&<span style={{color:'white',fontSize:depth===0?9:8,fontWeight:700}}>✓</span>}
          {task.status==='In Progress'&&<span style={{width:depth===0?7:5,height:depth===0?7:5,borderRadius:'50%',background:'#F59E0B',display:'block'}}/>}
        </div>

        {/* Title — double-click to rename */}
        {editingId===task.id
          ?<input autoFocus value={editTitle} onChange={e=>setEditTitle(e.target.value)}
              onBlur={()=>{if(editTitle.trim()&&editTitle.trim()!==task.title)db.updTask(task.id,{title:editTitle.trim()});setEditingId(null);}}
              onKeyDown={e=>{if(e.key==='Enter')e.target.blur();if(e.key==='Escape')setEditingId(null);}}
              onClick={e=>e.stopPropagation()}
              style={{flex:1,fontSize:depth===0?13:12,border:'1px solid #4a7c5e',borderRadius:5,padding:'2px 7px',outline:'none',fontFamily:'Heebo,sans-serif'}}/>
          :<span onDoubleClick={e=>{e.stopPropagation();setEditingId(task.id);setEditTitle(task.title);}}
              style={{flex:1,fontSize:depth===0?13:12,color:task.status==='Done'?'#B0B0B0':'#1A1A1A',textDecoration:task.status==='Done'?'line-through':'',fontWeight:depth===0?500:400,cursor:'text'}}
              title="לחץ פעמיים לשינוי שם">{task.title}</span>}

        {/* Subtask progress badge */}
        {hasChildren&&<span style={{fontSize:10,color:allChildDone?'#3D7A5A':anyChildDone?'#F59E0B':'#9C9C9C',background:allChildDone?'#ECFDF5':anyChildDone?'#FFFBEB':'#F3F4F6',padding:'1px 6px',borderRadius:4,fontWeight:600,flexShrink:0}}>
          {childDone}/{children.length}
        </span>}

        {/* Auto-promoted badge */}
        {task._subtasks_done&&<span style={{fontSize:9,fontWeight:700,color:'#065F46',background:'#D1FAE5',padding:'1px 5px',borderRadius:999,flexShrink:0}}>✓ הכל הושלם</span>}

        {/* Notes count */}
        {(task.notes||[]).length>0&&<span style={{fontSize:11,color:'#B0B0B0'}}>💬{task.notes.length}</span>}

        {/* Dependency icon */}
        {(task.depends_on||[]).length>0&&<span style={{fontSize:11,color:bl?'#EF4444':'#C0C0C0'}}>{bl?'⛔':'🔗'}</span>}

        {/* Ready to execute badge */}
        {isReady&&<span style={{display:'inline-flex',alignItems:'center',gap:3,background:'#ECFDF5',color:'#065F46',border:'1.5px solid #34D399',borderRadius:999,padding:'2px 8px',fontSize:10,fontWeight:800,flexShrink:0,animation:'readyPulse 1.8s ease-in-out infinite'}}>⚡ מוכן לביצוע</span>}

        {/* Priority dot */}
        <span style={{color:PRI[task.priority||'Medium'],fontSize:depth===0?12:10,flexShrink:0}}>●</span>

        {/* Assignee */}
        {asgn&&<Av u={asgn} size={depth===0?22:18}/>}

        {/* Deadline */}
        {task.deadline&&<span style={{fontSize:10,color:new Date(task.deadline)<new Date()&&task.status!=='Done'?'#EF4444':'#9C9C9C',flexShrink:0}}>{fmtD(task.deadline)}</span>}

        {/* Add subtask btn */}
        <button onClick={e=>{e.stopPropagation();setASI(task.id);setNST('');}}
          style={{background:'none',border:'none',cursor:'pointer',color:'#D0CEC9',fontSize:12,padding:'0 2px',flexShrink:0}}
          title="הוסף תת-משימה"
          onMouseOver={e=>e.target.style.color='#3D7A5A'} onMouseOut={e=>e.target.style.color='#D0CEC9'}>⊕</button>

        {/* Delete */}
        <button onClick={e=>{e.stopPropagation();db.delTask(task.id);}}
          style={{background:'none',border:'none',cursor:'pointer',color:'#D0CEC9',fontSize:13,padding:2,flexShrink:0}}
          onMouseOver={e=>e.target.style.color='#EF4444'} onMouseOut={e=>e.target.style.color='#D0CEC9'}>🗑</button>
      </div>

      {/* Add subtask inline input */}
      {addSubIn===task.id&&<div style={{display:'flex',gap:6,padding:`6px 12px 6px ${12+indent+18}px`,background:'#F5F4F0',borderTop:'1px solid #EEE'}}>
        <input autoFocus value={newSubTitle} onChange={e=>setNST(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter')addSubtask(task.id);if(e.key==='Escape')setASI(null);}}
          placeholder="שם תת-משימה..."
          style={{flex:1,height:28,padding:'0 8px',border:'1px solid #E8E6E1',borderRadius:6,fontSize:12,fontFamily:'Heebo,sans-serif'}}/>
        <Btn sz="sm" v="accent" onClick={()=>addSubtask(task.id)}>הוסף</Btn>
        <Btn sz="sm" v="ghost" onClick={()=>setASI(null)}>ביטול</Btn>
      </div>}

      {/* Children — recursive */}
      {isExpanded&&hasChildren&&<div style={{borderTop:'1px solid #F5F5F3'}}>
        {children.map(child=><TaskRow key={child.id} task={child} depth={depth+1}/>)}
      </div>}
    </div>;
  };

  return<div>
    {openTask&&<TaskModal task={openTask} allTasks={allTasks} allProjects={allProjs} partners={partners} onUpdate={db.updTask} onClose={()=>setOID(null)} onJumpToTask={jumpToTask} db={db}/>}
    <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
      <input value={newTitle} onChange={e=>setNT(e.target.value)}
        onKeyDown={e=>{if(e.key==='Enter'){const s=newSec||'';addTask(s);}}}
        placeholder="הוסף משימה חדשה..."
        style={{flex:1,minWidth:180,height:38,padding:'0 10px',border:'1px solid #E8E6E1',borderRadius:7,fontSize:13,fontFamily:'Heebo,sans-serif'}}/>
      <select value={newSec} onChange={e=>setNewSec(e.target.value)}
        style={{height:38,padding:'0 10px',border:'1px solid #E8E6E1',borderRadius:7,fontSize:13,background:'white',fontFamily:'Heebo,sans-serif',minWidth:140}}>
        <option value="">ללא קטגוריה</option>
        {sections.filter(s=>s).map(s=><option key={s} value={s}>{s}</option>)}
        <option value="__new__">+ קטגוריה חדשה...</option>
      </select>
      {newSec==='__new__'&&<input value={secInput} onChange={e=>setSI(e.target.value)}
        onKeyDown={e=>{if(e.key==='Enter'&&secInput.trim()){addSec();setNewSec(secInput.trim());}}}
        placeholder="שם קטגוריה..." autoFocus
        style={{width:140,height:38,padding:'0 10px',border:'1px solid #4a7c5e',borderRadius:7,fontSize:13,fontFamily:'Heebo,sans-serif'}}/>}
      <Btn onClick={()=>{const s=newSec==='__new__'?secInput.trim():newSec;if(newSec==='__new__'&&secInput.trim()){addSec();setNewSec(secInput.trim());}addTask(s);}}>+ הוסף</Btn>
      <Btn v="outline" sz="sm" onClick={()=>setNewSec('__new__')}>+ קטגוריה</Btn>
    </div>
    {sections.map(sec=>{
      const st=bySec(sec);
      if(sec!==''&&st.length===0&&!extras.includes(sec))return null;
      const exp=coll['s_'+sec]!==false;
      return<div key={sec||'__'} style={{marginBottom:14}}>
        {sec&&(()=>{
          const secDone=isSecDone(sec);
          const depsMet=isSecDepsMet(sec);
          const hasDeps=(secDeps[sec]||[]).length>0;
          const otherSecs=sections.filter(s=>s&&s!==sec);
          return<div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
            {/* Collapse arrow */}
            <span style={{fontSize:10,cursor:'pointer',color:'#8C8C8C'}} onClick={()=>setColl(c=>({...c,['s_'+sec]:!exp}))}>{exp?'▼':'▶'}</span>

                background:secDone?'#3D7A5A':'white',flexShrink:0,cursor:'pointer',
                display:'flex',alignItems:'center',justifyContent:'center',transition:'all .2s'}}>
              {secDone&&<span style={{color:'white',fontSize:9,fontWeight:700}}>✓</span>}
            </div>

            {/* Section name */}
            {editSec===sec

              :<><span style={{fontSize:11,fontWeight:700,color:secDone?'#3D7A5A':'#6B6B6B',textTransform:'uppercase',letterSpacing:'.06em',cursor:'text',textDecoration:secDone?'line-through':''}} onDoubleClick={()=>setES(sec)} title="לחץ פעמיים לשינוי שם">{sec}</span>
                <span style={{fontSize:11,color:'#B0B0B0'}}>{st.filter(t=>t.status==='Done').length}/{st.length}</span>
                <button onClick={()=>setES(sec)} style={{background:'none',border:'none',cursor:'pointer',color:'#D0CEC9',fontSize:11,padding:2}} title="שנה שם" onMouseOver={e=>e.target.style.color='#8C8C8C'} onMouseOut={e=>e.target.style.color='#D0CEC9'}>✏️</button></>}

            {/* Readiness badge */}
            {depsMet&&!secDone&&<span style={{display:'inline-flex',alignItems:'center',gap:3,background:'#ECFDF5',color:'#065F46',border:'1.5px solid #34D399',borderRadius:999,padding:'2px 8px',fontSize:10,fontWeight:800,flexShrink:0,animation:'readyPulse 1.8s ease-in-out infinite'}}>⚡ מוכן לביצוע</span>}

            {/* Manage deps button */}
            {otherSecs.length>0&&<div style={{position:'relative',marginRight:'auto'}}>
              <button onClick={()=>setShowSecDep(showSecDep===sec?null:sec)} style={{background:'none',border:'none',cursor:'pointer',color:'#D0CEC9',fontSize:11,padding:2}} title="הגדר תלויות" onMouseOver={e=>e.target.style.color='#8C8C8C'} onMouseOut={e=>e.target.style.color='#D0CEC9'}>⛓</button>
              {showSecDep===sec&&<div style={{position:'absolute',top:22,right:0,background:'white',border:'1px solid #E8E6E1',borderRadius:8,padding:10,zIndex:100,minWidth:180,boxShadow:'0 4px 16px rgba(0,0,0,.1)'}}>
                <div style={{fontSize:11,fontWeight:600,marginBottom:6,color:'#6B6B6B'}}>תלויות של "{sec}":</div>
                {otherSecs.map(s=>{
                  const checked=(secDeps[sec]||[]).includes(s);
                  return<label key={s} style={{display:'flex',alignItems:'center',gap:6,padding:'3px 0',cursor:'pointer',fontSize:12}}>
                    <input type="checkbox" checked={checked} onChange={()=>{
                      const cur=secDeps[sec]||[];
                      const next=checked?cur.filter(x=>x!==s):[...cur,s];
                      saveSecDep(sec,next);
                    }}/>
                    {s}
                  </label>;
                })}
                <button onClick={()=>setShowSecDep(null)} style={{marginTop:6,fontSize:11,color:'#8C8C8C',background:'none',border:'none',cursor:'pointer'}}>סגור</button>
              </div>}
            </div>}
          </div>;
        })()}
        {exp&&<div style={{background:'white',border:'1px solid #F0EDE8',borderRadius:10,overflow:'hidden'}}>
          {st.length===0&&<p style={{fontSize:12,color:'#B0B0B0',padding:'10px 14px',fontStyle:'italic'}}>אין משימות</p>}
          {st.map(t=><TaskRow key={t.id} task={t} depth={0}/>)}
          {addingIn===sec
            ?<div style={{display:'flex',gap:6,padding:'7px 10px',borderTop:'1px solid #F5F5F3'}}>
              <input autoFocus value={newTitle} onChange={e=>setNT(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addTask(sec);if(e.key==='Escape')setAI(null);}} placeholder="שם משימה..." style={{flex:1,height:30,padding:'0 8px',border:'1px solid #E8E6E1',borderRadius:6,fontSize:13,fontFamily:'Heebo,sans-serif'}}/>
              <Btn sz="sm" v="accent" onClick={()=>addTask(sec)}>הוסף</Btn><Btn sz="sm" v="ghost" onClick={()=>setAI(null)}>ביטול</Btn>
            </div>
            :<button onClick={()=>setAI(sec)} className="hr" style={{width:'100%',textAlign:'right',padding:'7px 14px',fontSize:12,color:'#B0B0B0',background:'none',border:'none',borderTop:'1px solid #F5F5F3',cursor:'pointer',fontFamily:'Heebo,sans-serif'}}>+ הוסף משימה לקטגוריה</button>}
        </div>}
      </div>;
    })}
  </div>;
}

// ── Mini SVG Bar Chart ────────────────────────────────────────────────────────
function CashflowChart({ms,height=160}){
  // Build monthly buckets from expected/actual dates
  // Use actual completion date if done, otherwise expected_date for forecast
  const events=ms
    .filter(m=>(m.payment_amount>0)&&((m.completed&&m.date)||(m.expected_date&&m.expected_date!=='')))
    .map(m=>({
      label:m.name,
      amount:m.payment_amount||0,
      date:(m.completed&&m.date) ? m.date : m.expected_date,
      isFuture:!m.completed,
      paid:m.payment_status==='Paid',
    }));

  if(events.length===0)return(
    <div style={{background:'#F9F8F6',border:'1px dashed #E0DDD8',borderRadius:10,padding:'24px',textAlign:'center',color:'#B0B0B0',fontSize:12}}>
      הוסף צפי תאריך לאבני דרך כדי לראות את תזרים ההכנסות
    </div>
  );

  // Group by month
  const byMonth={};
  events.forEach(e=>{
    const d=new Date(e.date);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!byMonth[key])byMonth[key]={key,expected:0,paid:0,labels:[],allFuture:true};
    byMonth[key].expected+=e.amount;
    if(e.paid)byMonth[key].paid+=e.amount;
    if(!e.isFuture)byMonth[key].allFuture=false;
    byMonth[key].labels.push(e.label);
  });

  const months=Object.values(byMonth).sort((a,b)=>a.key.localeCompare(b.key));
  if(months.length===0)return null;

  // Cumulative lines
  let cumExp=0,cumPaid=0;
  const withCum=months.map(m=>{cumExp+=m.expected;cumPaid+=m.paid;return{...m,cumExp,cumPaid};});

  const maxVal=Math.max(...withCum.map(m=>m.cumExp),1);
  const W=Math.max(months.length*80,320);
  const H=height;
  const PAD={t:16,r:16,b:40,l:64};
  const cW=W-PAD.l-PAD.r,cH=H-PAD.t-PAD.b;
  const bw=Math.min(36,cW/months.length-8);

  const xOf=i=>PAD.l+i*(cW/months.length)+cW/(months.length*2);
  const yOf=v=>PAD.t+cH-(v/maxVal)*cH;

  // Y gridlines
  const ticks=[0,.25,.5,.75,1].map(f=>Math.round(maxVal*f));

  const fmtMonth=key=>{const[y,m]=key.split('-');const d=new Date(y,m-1);return d.toLocaleDateString('he-IL',{month:'short',year:'2-digit'});};

  return(
    <div style={{overflowX:'auto'}}>
      <svg width={W} height={H} style={{display:'block',direction:'ltr'}}>
        {/* Grid */}
        {ticks.map(t=>{
          const y=yOf(t);
          return<g key={t}>
            <line x1={PAD.l} y1={y} x2={W-PAD.r} y2={y} stroke="#F0EDE8" strokeWidth={1}/>
            <text x={PAD.l-6} y={y+4} textAnchor="end" fontSize={9} fill="#B0B0B0" fontFamily="Heebo,sans-serif">
              {t>=1000?'₪'+(t/1000).toFixed(0)+'K':'₪'+t}
            </text>
          </g>;
        })}

        {/* Bars — monthly income */}
        {withCum.map((m,i)=>{
          const x=xOf(i);
          const barH=(m.expected/maxVal)*cH;
          const paidH=(m.paid/maxVal)*cH;
          return<g key={m.key}>
            {/* Expected bar — dashed if future */}
            <rect x={x-bw/2} y={yOf(m.expected)} width={bw} height={barH}
              rx={3} fill={m.allFuture?"#EEF6F2":"#E8EDE9"}
              stroke={m.allFuture?"#9FC9B0":"#C4D9CC"} strokeWidth={1.5}
              strokeDasharray={m.allFuture?"4 2":"none"} opacity={m.allFuture?.8:1}/>
            {/* Paid overlay */}
            {m.paid>0&&<rect x={x-bw/2} y={yOf(m.paid)} width={bw} height={paidH}
              rx={3} fill="#3D7A5A" opacity={.85}/>}
            {/* Month label */}
            <text x={x} y={H-PAD.b+14} textAnchor="middle" fontSize={9} fill="#8C8C8C" fontFamily="Heebo,sans-serif">{fmtMonth(m.key)}</text>
            {/* Amount on bar */}
            <text x={x} y={yOf(m.expected)-4} textAnchor="middle" fontSize={8} fill="#6B6B6B" fontFamily="Heebo,sans-serif">
              {m.expected>=1000?'₪'+(m.expected/1000).toFixed(0)+'K':'₪'+m.expected}
            </text>
          </g>;
        })}

        {/* Cumulative line — expected */}
        <polyline fill="none" stroke="#B8956A" strokeWidth={2} strokeDasharray="4 2"
          points={withCum.map((m,i)=>`${xOf(i)},${yOf(m.cumExp)}`).join(' ')}/>
        {/* Cumulative line — paid */}
        {withCum.some(m=>m.cumPaid>0)&&<polyline fill="none" stroke="#3D7A5A" strokeWidth={2}
          points={withCum.map((m,i)=>`${xOf(i)},${yOf(m.cumPaid)}`).join(' ')}/>}

        {/* Dots */}
        {withCum.map((m,i)=><g key={'d'+m.key}>
          <circle cx={xOf(i)} cy={yOf(m.cumExp)} r={3} fill="#B8956A"/>
          {m.cumPaid>0&&<circle cx={xOf(i)} cy={yOf(m.cumPaid)} r={3} fill="#3D7A5A"/>}
        </g>)}
      </svg>

      {/* Legend */}
      <div style={{display:'flex',gap:16,justifyContent:'center',marginTop:4,fontSize:11,color:'#6B6B6B'}}>
        <div style={{display:'flex',alignItems:'center',gap:5}}><div style={{width:14,height:8,background:'#E8EDE9',border:'1px solid #C4D9CC',borderRadius:2}}/> צפי גבייה</div>
        <div style={{display:'flex',alignItems:'center',gap:5}}><div style={{width:14,height:8,background:'#3D7A5A',borderRadius:2}}/> שולם בפועל</div>
        <div style={{display:'flex',alignItems:'center',gap:5}}><div style={{width:14,height:2,background:'#B8956A'}}/> מצטבר צפוי</div>
        <div style={{display:'flex',alignItems:'center',gap:5}}><div style={{width:14,height:2,background:'#3D7A5A'}}/> מצטבר בפועל</div>
      </div>
    </div>
  );
}

function MilestonesTab({project,db}){
  const [nn,setNN]=useState('');
  const [na,setNA]=useState('');
  const [showChart,setShowChart]=useState(true);
  const ms=project.milestones||[];
  const save=u=>db.updProject(project.id,{milestones:u});
  const tog=i=>save(ms.map((m,x)=>x===i?{...m,completed:!m.completed,date:!m.completed?new Date().toISOString().split('T')[0]:''}:m));
  const togP=i=>save(ms.map((m,x)=>x===i?{...m,payment_status:m.payment_status==='Paid'?'Unpaid':'Paid'}:m));
  const updField=(i,k,v)=>save(ms.map((m,x)=>x===i?{...m,[k]:v}:m));
  const rem=i=>save(ms.filter((_,x)=>x!==i));
  const add=()=>{if(!nn.trim())return;save([...ms,{name:nn.trim(),completed:false,date:'',expected_date:'',payment_amount:na?Number(na):undefined,payment_status:na?'Unpaid':undefined}]);setNN('');setNA('');};

  const done=ms.filter(m=>m.completed).length;
  const prog=ms.length?Math.round(done/ms.length*100):0;
  const tot=ms.reduce((s,m)=>s+(m.payment_amount||0),0);
  const paid=ms.filter(m=>m.payment_status==='Paid').reduce((s,m)=>s+(m.payment_amount||0),0);
  const pending=tot-paid;

  // Overdue payments — expected date passed, not paid
  const today=new Date();
  const overduePayments=ms.filter(m=>m.expected_date&&new Date(m.expected_date)<today&&m.payment_status!=='Paid'&&m.payment_amount>0);
  const upcomingPayments=ms.filter(m=>m.expected_date&&new Date(m.expected_date)>=today&&!m.completed&&m.payment_amount>0).sort((a,b)=>new Date(a.expected_date)-new Date(b.expected_date));

  return<div>
    {/* KPI strip */}
    {ms.length>0&&<div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:16}}>
      {[
        {l:'התקדמות',v:prog+'%',bg:'#EBF4EF',col:'#2D5A42'},
        {l:'סה"כ',v:fmtM(tot),bg:'#F5F4F0',col:'#4A4A4A'},
        {l:'שולם',v:fmtM(paid),bg:'#EBF4EF',col:'#2D5A42'},
        {l:'ממתין',v:fmtM(pending),bg:pending>0?'#FBF5EE':'#F5F4F0',col:pending>0?'#92400E':'#9C9C9C'},
      ].map(s=><div key={s.l} style={{background:s.bg,borderRadius:10,padding:'10px 14px'}}>
        <div style={{fontSize:16,fontWeight:700,color:s.col}}>{s.v}</div>
        <div style={{fontSize:10,color:s.col,opacity:.7,textTransform:'uppercase',letterSpacing:'.05em',marginTop:2}}>{s.l}</div>
      </div>)}
    </div>}

    {/* Alerts */}
    {overduePayments.length>0&&<div style={{background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:10,padding:'10px 14px',marginBottom:12,fontSize:12,color:'#DC2626',fontWeight:600}}>
      ⚠️ {overduePayments.length} תשלומים עבר צפי הגבייה שלהם — {fmtM(overduePayments.reduce((s,m)=>s+(m.payment_amount||0),0))}
    </div>}
    {upcomingPayments.length>0&&<div style={{background:'#FBF5EE',border:'1px solid #F5DDB8',borderRadius:10,padding:'10px 14px',marginBottom:12,fontSize:12,color:'#92400E'}}>
      📅 הבא: <strong>{upcomingPayments[0].name}</strong> — {fmtM(upcomingPayments[0].payment_amount)} ב-{fmtD(upcomingPayments[0].expected_date)}
    </div>}

    {/* Cashflow chart */}
    {ms.some(m=>m.payment_amount>0)&&<div style={{background:'white',border:'1px solid #E8E5DF',borderRadius:12,padding:'14px 16px',marginBottom:16}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <span style={{fontSize:13,fontWeight:600}}>תזרים הכנסות צפוי</span>
        <button onClick={()=>setShowChart(!showChart)} style={{background:'none',border:'none',cursor:'pointer',fontSize:12,color:'#9C9C9C',fontFamily:'Heebo,sans-serif'}}>{showChart?'הסתר ▲':'הצג ▼'}</button>
      </div>
      {showChart&&<CashflowChart ms={ms}/>}
    </div>}

    {/* Add row */}
    <div style={{display:'flex',gap:8,marginBottom:14}}>
      <input value={nn} onChange={e=>setNN(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()} placeholder="שם אבן דרך..." style={{flex:1,height:38,padding:'0 10px',border:'1px solid #E8E6E1',borderRadius:7,fontSize:13,fontFamily:'Heebo,sans-serif'}}/>
      <input value={na} onChange={e=>setNA(e.target.value)} type="number" placeholder="סכום ₪" style={{width:100,height:38,padding:'0 10px',border:'1px solid #E8E6E1',borderRadius:7,fontSize:13,fontFamily:'Heebo,sans-serif'}}/>
      <Btn onClick={add}>+ הוסף</Btn>
    </div>

    {/* Milestone rows */}
    {ms.map((m,i)=>{
      const isOverdue=m.expected_date&&new Date(m.expected_date)<today&&!m.completed;
      return<div key={i} style={{background:'white',border:'1px solid '+(isOverdue?'#FECACA':'#E8E6E1'),borderRadius:10,padding:'12px 14px',marginBottom:8,transition:'all .2s'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:m.payment_amount?8:0}}>
          {/* Complete toggle */}

            {m.payment_status==='Paid'?'✅':'💰'} {fmtM(m.payment_amount)} — {m.payment_status==='Paid'?'שולם':'סמן כשולם'}
          </button>
