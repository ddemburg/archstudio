function AppSettingsPage({db}){
  const [members,setMembers]=useState([]);
  const [loadingMembers,setLoadingMembers]=useState(true);
  const [addForm,setAddForm]=useState({email:'',name:'',role:'drafter'});
  const [addErr,setAddErr]=useState('');
  const [addOk,setAddOk]=useState('');
  const [adding,setAdding]=useState(false);
  const [currentMember,setCurrentMember]=useState(null);

  useEffect(()=>{
    apiGetMembers().then(m=>{setMembers(m||[]);setLoadingMembers(false);}).catch(()=>setLoadingMembers(false));
    sbGetMember(sessionStorage.getItem('arch_email')).then(setCurrentMember).catch(()=>{});
  },[]);

  const isAdmin=currentMember?.role==='admin';

  const doAdd=async()=>{
    if(!addForm.email.trim()){setAddErr('נא להזין כתובת אימייל');return;}
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(addForm.email.trim())){setAddErr('כתובת אימייל לא תקינה');return;}
    setAdding(true);setAddErr('');setAddOk('');
    try{
      await apiAddMember(addForm.email.trim(), addForm.name.trim()||addForm.email.trim(), addForm.role);
      const updated=await apiGetMembers();
      setMembers(updated||[]);
      setAddForm({email:'',name:'',role:'drafter'});
      setAddOk('המשתמש נוסף בהצלחה! הוא יוכל להיכנס עם חשבון Google שלו.');
      setTimeout(()=>setAddOk(''),5000);
    }catch(e){setAddErr('שגיאה: '+e.message);}
    setAdding(false);
  };

  const doRemove=async(email)=>{
    // Prevent removing the last admin
    const admins=members.filter(m=>m.role==='admin');
    if(admins.length===1&&admins[0].email===email){alert('Cannot remove the last admin.');return;}
    // Prevent removing yourself
    if(email===sessionStorage.getItem('arch_email')){alert('You cannot remove yourself.');return;}
    if(!window.confirm('להסיר את '+email+' מהמשרד?'))return;
    try{
      await apiRemoveMember(email);
      setMembers(m=>m.filter(x=>x.email!==email));
    }catch(e){alert('שגיאה: '+e.message);}
  };

  const doChangeRole=async(email,role)=>{
    // Prevent demoting the last admin
    if(role!=='admin'){
      const admins=members.filter(m=>m.role==='admin');
      if(admins.length===1&&admins[0].email===email){alert('Cannot demote the last admin.');return;}
    }
    // Prevent demoting yourself
    if(email===sessionStorage.getItem('arch_email')&&role!=='admin'){alert('You cannot change your own role.');return;}
    try{
      await apiUpdateMember(email,role,[]);
      setMembers(m=>m.map(x=>x.email===email?{...x,role}:x));
    }catch(e){alert('שגיאה: '+e.message);}

  const ROLE_LABELS={'admin':'מנהל ראשי','manager':'מנהל משרד','drafter':'שרטט','client':'לקוח'};

  return<div>

    {/* ── Team Members ── */}

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div>
          <div style={{fontSize:15,fontWeight:600}}>צוות המשרד</div>
          <div style={{fontSize:12,color:'#8C8C8C',marginTop:2}}>הוסף עמיתים לפי כתובת Gmail שלהם</div>
        </div>
      </div>

      {/* Members list */}
      {loadingMembers?<div style={{color:'#8C8C8C',fontSize:13,padding:'8px 0'}}>טוען...</div>:
      <div style={{marginBottom:isAdmin?16:0}}>
        {members.map(m=>(
          <div key={m.email} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:'1px solid #F5F5F3'}}>
            {m.picture?<img src={m.picture} style={{width:34,height:34,borderRadius:'50%',flexShrink:0}} alt=""/>
              :<div style={{width:34,height:34,borderRadius:'50%',background:'#E8E6E1',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:600,color:'#5A5A5A',flexShrink:0}}>{(m.name||m.email)[0]}</div>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.name||m.email}</div>
              <div style={{fontSize:11,color:'#8C8C8C',overflow:'hidden',textOverflow:'ellipsis'}}>{m.email}</div>
            </div>
            {isAdmin&&m.email!==sessionStorage.getItem('arch_email')
              ?<select value={m.role} onChange={e=>doChangeRole(m.email,e.target.value)}
                  style={{height:30,padding:'0 8px',border:'1px solid #E8E6E1',borderRadius:6,fontSize:12,color:ROLE_COLORS[m.role],fontFamily:'Heebo,sans-serif',background:'white'}}>
                  {Object.entries(ROLE_LABELS).map(([v,l])=><option key={v} value={v}>{l}</option>)}
                </select>
              :<span style={{fontSize:11,fontWeight:600,padding:'3px 10px',borderRadius:999,background:'#F0F0F0',color:ROLE_COLORS[m.role]}}>{ROLE_LABELS[m.role]||m.role}</span>}

              <button onClick={()=>doRemove(m.email)} style={{background:'none',border:'none',cursor:'pointer',color:'#DC2626',fontSize:16,padding:4,lineHeight:1}} title="הסר מהמשרד">✕</button>}

      {/* Add member form — admins only */}
      {isAdmin&&<div style={{background:'#FAFAF8',borderRadius:10,padding:14,border:'1px solid #F0EDE8'}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>הוסף חבר צוות חדש</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>

        {addOk&&<div style={{marginTop:8,fontSize:12,color:'#065F46',background:'#ECFDF5',padding:'6px 10px',borderRadius:6}}>✓ {addOk}</div>}
        <div style={{marginTop:8,fontSize:11,color:'#9C9C9C'}}>המשתמש יוכל להיכנס עם חשבון Google שלו מיד לאחר ההוספה.</div>
      </div>}
    </div>

    <div style={{background:'white',border:'1px solid #E8E6E1',borderRadius:12,padding:20,maxWidth:480,marginBottom:16}}>
      <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>אינטגרציות עתידיות</div>

function DriveBanner({db}){
  const fmt=d=>{if(!d)return'';const dt=new Date(d);return dt.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});};
  if(!db.driveReady)return null;
  return(
    <div style={{display:'flex',alignItems:'center',gap:8,fontSize:11,color:'#5C5C5C'}}>
      {db.driveSyncing
        ? <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:8,height:8,borderRadius:'50%',background:'#F59E0B',display:'inline-block',animation:'pulse 1s infinite'}}/>שומר...</span>
        : db.driveError
          ? <span style={{color:'#DC3545'}}>⚠ {db.driveError}</span>
          : <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:8,height:8,borderRadius:'50%',background:'#3D7A5A',display:'inline-block'}}/>נשמר {fmt(db.driveLastSave)}</span>
      }
    </div>
  );
}

function App(){
  const db=useApp();
  const [page,setPage]=useState(()=>{
    // Restore page from history state on load
    const s=window.history.state;
    return s?.page||'dashboard';
  });
  const [pid,setPID]=useState(()=>{
    const s=window.history.state;
    return s?.pid||null;
  });
  const [showNew,setShowNew]=useState(false);
  const [portalPid,setPortalPid]=useState(null);
  // currentUser is derived from logged-in Google email — no manual selection needed
  const loggedEmail = sessionStorage.getItem('arch_email')||'';
  const currentUser = db.partners.find(p=>p.email===loggedEmail) || db.partners[0];
  const currentUserId = currentUser?.id||'';
  const setCurrentUserId = ()=>{}; // no-op, kept for prop compatibility
  const [preTpl,setPreTpl]=useState('');
  const [sbFilter,setSBF]=useState('all:All');
  const proj=db.projects.find(p=>p.id===pid);
  const [loggedIn,setLoggedIn]=useState(false);
  const [autoLogging,setAutoLogging]=useState(true);

  // Try silent login on first render
  useEffect(()=>{
    let cancelled=false;
    const tryAuto=async()=>{
      try{
        // First check sessionStorage - instant, no network
        const token = sessionStorage.getItem('arch_token');
        const exp = parseInt(sessionStorage.getItem('arch_token_exp')||'0');
        if(token && exp > Date.now()+60000){
          if(!cancelled){
            _gAccessToken = token;
            setLoggedIn(true);
            await db.driveLoad();
            setAutoLogging(false);
          }
          return;
        }
        // Wait for GSI to load then try silent
        await new Promise(r=>setTimeout(r,1200));
        if(cancelled)return;
        const ok=await gTrySilentSignIn();
        if(!cancelled){
          if(ok){ setLoggedIn(true); await db.driveLoad(); }
          setAutoLogging(false);
        }
      }catch(e){ if(!cancelled) setAutoLogging(false); }
    };
    tryAuto();
    return()=>{cancelled=true;};
  },[]);

  const handleLogin=async()=>{
    setLoggedIn(true);
    await db.driveLoad();
  };

  // Handle browser back/forward - MUST be before any early returns
  useEffect(()=>{
    const onPop=e=>{
      const s=e.state||{page:'dashboard',pid:null};
      setPage(s.page||'dashboard');
      setPID(s.pid||null);
    };
    window.addEventListener('popstate',onPop);
    window.history.replaceState({page:'dashboard',pid:null},'',window.location.pathname);
    return()=>window.removeEventListener('popstate',onPop);
  },[]);

  if(autoLogging) return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#F5F4F0',fontFamily:'Heebo,sans-serif'}}>

        <div style={{fontSize:16,color:'#5C5C5C'}}>טוען...</div>

      <div style={{flex:1}}/>
      <div style={{padding:"12px 14px",borderTop:"1px solid rgba(255,255,255,.08)",flexShrink:0,display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:30,height:30,borderRadius:'50%',background:currentUser?.color||'#4a7c5e',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:600,fontSize:13,flexShrink:0,cursor:'pointer'}} onClick={()=>navTo('appsettings',null)}>{currentUser?.name?.[0]||'א'}</div>
        <div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{currentUser?.name||loggedEmail||'מנהל'}</div><div style={{fontSize:11,color:'#8C8C8C'}}>{currentUser?.role||''} • {db.partners.length} בצוות</div></div>
        <button onClick={()=>navTo('appsettings',null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"rgba(255,255,255,.3)",padding:2,transition:"color .15s"}} onMouseOver={e=>e.target.style.color="rgba(255,255,255,.8)"} onMouseOut={e=>e.target.style.color="rgba(255,255,255,.3)"} title="הגדרות">⚙️</button>
        <button onClick={()=>{
          sessionStorage.removeItem('arch_token');
          sessionStorage.removeItem('arch_email');
          localStorage.removeItem('arch_hint');
          window.location.reload();
        }} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"rgba(255,255,255,.3)",padding:2,transition:"color .15s"}} onMouseOver={e=>e.target.style.color="rgba(255,100,100,.8)"} onMouseOut={e=>e.target.style.color="rgba(255,255,255,.3)"} title="התנתק">🚪</button>
      </div>
    </aside>

    {/* Main */}
    <main style={{marginRight:232,flex:1,padding:"28px 40px",minHeight:"100vh",maxWidth:"calc(100vw - 232px)"}}>
      <div className="fade" key={page+pid}>
        {page==='dashboard'  && <Dashboard db={db} nav={nav} onNew={()=>setShowNew(true)} onOpen={openProj} setPortalPid={setPortalPid}/>}
        {page==='project'    && proj && <ProjectDetail project={proj} db={db} onBack={()=>{setPage('dashboard');setPID(null);}} currentUser={currentUser} onOpenPortal={()=>setPortalPid(proj.id)} nav={nav}/>}
        {page==='tasks'      && <AllTasksPage db={db} nav={nav}/>}
        {page==='leads'      && <LeadsPage db={db} nav={nav}/>}
        {page==='crm'        && <CRMPage db={db} nav={nav} currentUser={currentUser}/>}
        {page==='reports'     && <ReportsPage db={db} nav={nav}/>}
        {page==='partners'   && <PartnersPage db={db} nav={nav}/>}
        {page==='committees' && <CommitteesPage db={db} nav={nav}/>}
        {page==='templates'  && <TemplatesPage db={db} nav={nav} onNewFromTpl={openNewWithTpl}/>}
        {page==='appsettings' && <AppSettingsPage db={db}/>}
      </div>
    </main>

    {portalPid&&(()=>{const pp=db.projects.find(p=>p.id===portalPid);return pp?<ClientPortal project={pp} db={db} onClose={()=>setPortalPid(null)}/>:null;})()}
    <NewProjectModal open={showNew} onClose={()=>{setShowNew(false);setPreTpl('');}} db={db}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
