            <span style={{fontSize:10,color:'#B0B0B0',textTransform:'uppercase',letterSpacing:'.04em'}}>תאריך גבייה בפועל</span>
            <input type="date" value={m.actual_payment_date||''} onChange={e=>updField(i,'actual_payment_date',e.target.value)}
              style={{height:26,padding:'0 6px',border:'1px solid #E8E6E1',borderRadius:6,fontSize:11,background:'white',fontFamily:'Heebo,sans-serif',width:130}}/>
          </div>
        </div>}
      </div>;
    })}
  </div>;
}

// ─── Docs ─────────────────────────────────────────────────────────────────────
function DocsTab({docs,pid,db}){
  const today=new Date();
  const soon=d=>{if(!d)return false;const dt=new Date(d);const diff=(dt-today)/(1000*60*60*24);return diff>=0&&diff<=30;};
  const expired=d=>{if(!d)return false;return new Date(d)<today;};
  const [sf,setSF]=useState(false);const [form,setF]=useState({name:'',category:'Other'});
  const cats=['Blueprint','Permit','Contract','Report','Correspondence','Other'];
  const CC={Blueprint:'#EFF6FF|#1D4ED8',Permit:'#FFFBEB|#B45309',Contract:'#F5F3FF|#6D28D9',Report:'#ECFDF5|#065F46',Correspondence:'#FFF1F2|#BE123C',Other:'#F3F4F6|#6B7280'};
  const add=()=>{if(!form.name.trim())return;db.addDoc({project_id:pid,...form});setF({name:'',category:'Other'});setSF(false);};
  return<div>
    {!sf?<Btn v="outline" sx={{marginBottom:14,borderStyle:'dashed'}} onClick={()=>setSF(true)}>📎 הוסף מסמך</Btn>
    :<div style={{background:'white',border:'1px solid #E8E6E1',borderRadius:10,padding:14,marginBottom:14,display:'flex',flexDirection:'column',gap:10}}>
      <I label="שם" value={form.name} onChange={e=>setF(f=>({...f,name:e.target.value}))} placeholder='תוכנית קומה v3'/>
      <SE label="קטגוריה" value={form.category} onChange={e=>setF(f=>({...f,category:e.target.value}))}>{cats.map(c=><option key={c}>{c}</option>)}</SE>
      <I label="תוקף (לא חובה)" type="date" value={form.expiry||''} onChange={e=>setF(f=>({...f,expiry:e.target.value}))}/>
      <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}><Btn v="ghost" sz="sm" onClick={()=>setSF(false)}>ביטול</Btn><Btn sz="sm" onClick={add}>הוסף</Btn></div>
    </div>}
    {docs.length===0&&<div style={{background:'white',border:'1px solid #E8E6E1',borderRadius:10,padding:40,textAlign:'center',color:'#8C8C8C'}}><div style={{fontSize:28,marginBottom:6}}>📄</div><div>אין מסמכים</div></div>}
    {docs.map(d=>{const [bg,col]=(CC[d.category]||CC.Other).split('|');return<div key={d.id} className="hc" style={{display:'flex',alignItems:'center',gap:10,background:'white',border:'1px solid #E8E6E1',borderRadius:10,padding:'10px 14px',marginBottom:7,transition:'all .2s'}}>
      <span style={{fontSize:20}}>📄</span><div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{d.name}</div><span style={{fontSize:10,fontWeight:600,padding:'2px 7px',borderRadius:999,display:'inline-block',marginTop:2,background:bg,color:col}}>{d.category}</span></div>
      {d.expiry&&expired(d.expiry)&&<span style={{fontSize:10,background:'#FEF2F2',color:'#DC2626',padding:'1px 7px',borderRadius:4,fontWeight:700,whiteSpace:'nowrap'}}>פג תוקף</span>}
      {d.expiry&&soon(d.expiry)&&!expired(d.expiry)&&<span style={{fontSize:10,background:'#FFFBEB',color:'#B45309',padding:'1px 7px',borderRadius:4,fontWeight:700,whiteSpace:'nowrap'}}>פג בקרוב</span>}
      {d.expiry&&<span style={{fontSize:11,color:'#9C9C9C',whiteSpace:'nowrap'}}>{fmtD(d.expiry)}</span>}
      <button onClick={()=>db.delDoc(d.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#D0CEC9',fontSize:14}} onMouseOver={e=>e.target.style.color='#EF4444'} onMouseOut={e=>e.target.style.color='#D0CEC9'}>🗑</button>
    </div>;})}
  </div>;
}

// ─── Settings + Template ──────────────────────────────────────────────────────
function SettingsTab({project,db,onDel,currentUser}){
  const [form,setF]=useState({name:project.name||'',address:project.address||'',status:project.status||'Planning',client_name:project.client_name||'',client_email:project.client_email||'',client_phone:project.client_phone||'',budget:project.budget||'',notes:project.notes||'',start_date:project.start_date||'',target_completion:project.target_completion||'',planning_committee_id:project.planning_committee_id||'',zone:project.zone||'',manager_id:project.manager_id||''});
  const [saved,setSaved]=useState(false);
  const [showTpl,setShowTpl]=useState(false);
  const [tplName,setTplName]=useState('');
  const u=(k,v)=>setF(f=>({...f,[k]:v}));
  const save=()=>{const c=db.committees.find(x=>x.id===form.planning_committee_id);db.updProject(project.id,{...form,budget:form.budget?Number(form.budget):undefined,planning_committee:c?c.name:''});setSaved(true);setTimeout(()=>setSaved(false),2000);};
  const byType=db.committees.reduce((acc,c)=>{if(!acc[c.type])acc[c.type]=[];acc[c.type].push(c);return acc;},{});

  const myTasks=db.tasks.filter(t=>t.project_id===project.id);
  const myReqs=db.reqs.filter(r=>r.project_id===project.id);
  const myApp=db.approvs.filter(a=>a.project_id===project.id);

  const createTpl=()=>{
    if(!tplName.trim())return;
    db.saveTpl({
      name:tplName.trim(),sourceProject:project.name,
      milestones:(project.milestones||[]).map(m=>({name:m.name,payment_amount:m.payment_amount})),
      tasks:myTasks.map(t=>({title:t.title,section:t.section,priority:t.priority})),

    <I label="כתובת" value={form.address} onChange={e=>u('address',e.target.value)}/>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
      <label><span style={{display:'block',fontSize:11,fontWeight:600,color:'#8C8C8C',textTransform:'uppercase',marginBottom:5}}>ועדת תכנון</span>
        <select value={form.planning_committee_id} onChange={e=>u('planning_committee_id',e.target.value)} style={{width:'100%',height:38,padding:'0 10px',border:'1px solid #E8E6E1',borderRadius:7,fontSize:13,background:'white',fontFamily:'Heebo,sans-serif'}}>
          <option value="">— בחר —</option>
          {Object.entries(byType).map(([tp,list])=><optgroup key={tp} label={"ועדה "+tp}>{list.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</optgroup>)}
          {db.committees.length===0&&<option disabled>הוסף ועדות בדף "ועדות"</option>}
        </select>
      </label>
      <SE label="אזור" value={form.zone} onChange={e=>u('zone',e.target.value)}><option value="">— בחר —</option>{['אזור מרכז','אזור תל אביב','אזור ירושלים','אזור חיפה','אזור צפון','אזור דרום','אזור שרון'].map(z=><option key={z}>{z}</option>)}</SE>
    </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <I label="שם" value={form.client_name} onChange={e=>u('client_name',e.target.value)}/>

        <I label="התחלה" type="date" value={form.start_date} onChange={e=>u('start_date',e.target.value)}/>
        <I label="יעד סיום" type="date" value={form.target_completion} onChange={e=>u('target_completion',e.target.value)}/>

    <div style={{display:'flex',justifyContent:'space-between',paddingTop:10,borderTop:'1px solid #F5F5F3',flexWrap:'wrap',gap:8}}>
      <Btn v="danger" onClick={()=>window.confirm('למחוק את הפרויקט?')&&onDel()}>🗑 מחק פרויקט</Btn>
      <div style={{display:'flex',gap:8}}>
        <Btn v="outline" onClick={()=>setShowTpl(true)}>📋 שמור כתבנית</Btn>
        <Btn onClick={save}>{saved?'✓ נשמר!':'💾 שמור'}</Btn>
      </div>

    <Modal open={showTpl} onClose={()=>setShowTpl(false)} title="שמור כתבנית">
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <p style={{fontSize:13,color:'#6B6B6B',lineHeight:1.6}}>התבנית תכלול את כל תוכן הפרויקט — ללא פרטי לקוח ותאריכים.</p>
        <div style={{background:'#F7F6F3',borderRadius:8,padding:12,fontSize:12,color:'#6B6B6B',display:'flex',flexDirection:'column',gap:4}}>

          <div>📨 {myReqs.length} בקשות מסמכים</div>
          <div>✅ {myApp.length} פריטי אישור</div>

        <I label="שם התבנית" value={tplName} onChange={e=>setTplName(e.target.value)} placeholder='לדוגמה: בית מגורים — בסיסי'/>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}><Btn v="ghost" onClick={()=>setShowTpl(false)}>ביטול</Btn><Btn onClick={createTpl} disabled={!tplName.trim()}>💾 שמור תבנית</Btn></div>
      </div>
    </Modal>
  </div>;
}

// ─── Project Detail ───────────────────────────────────────────────────────────
function ProjectDetail({project,db,onBack,currentUser,onOpenPortal,nav}){
  const [tab,setTab]=useState('tasks');
  const myT=db.tasks.filter(t=>t.project_id===project.id);
  // Filter assignable partners per project based on role + assigned_projects
  const filteredPartners=db.partners.filter(p=>{
    if(!p.email) return true; // no email = always show (legacy partner)
    const om=db.officeMembers.find(m=>m.email===p.email);
    if(!om) return true; // not in office_members = always show
    if(om.role==='admin'||om.role==='manager') return true;
    if(om.role==='drafter'){
      return (om.assigned_projects||[]).includes(project.id);
    }
    return false; // client role = not assignable
  });
  const ms=project.milestones||[];
  const prog=ms.length?Math.round(ms.filter(m=>m.completed).length/ms.length*100):0;
  const TABS=[{id:'tasks',l:'משימות',e:'☑️'},{id:'flow',l:'זרימה',e:'🗺'},{id:'ms',l:'אבני דרך',e:'🚩'},{id:'docs',l:'מסמכים',e:'📄'},{id:'reqs',l:'בקשות',e:'📨'},{id:'app',l:'אישורים',e:'✅'},{id:'consultants',l:'יועצים',e:'🔧'},{id:'cfg',l:'הגדרות',e:'⚙️'}];
  return<div>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
      <div style={{display:'flex',alignItems:'center',gap:6,fontSize:13}}><span style={{color:'#9C9C9C',cursor:'pointer'}} onClick={onBack}>לוח בקרה</span><span style={{color:'#C0C0C0'}}>/</span><span style={{color:'#1A1A1A',fontWeight:600}}>{project.name}</span></div>
      <Btn v='outline' sz='sm' onClick={onOpenPortal} sx={{gap:6}}>👁 תצוגת לקוח</Btn>
    </div>
    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:18,flexWrap:'wrap',gap:12}}>
      <div>
        <h1 style={{fontSize:24,fontWeight:600,marginBottom:6}}>{project.name}</h1>
        <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
          <SBadge status={project.status}/>
          {project.address&&<span style={{fontSize:13,color:'#8C8C8C'}}>📍 {project.address}</span>}
          {project.gush&&<span style={{fontSize:12,color:'#8C8C8C'}}>גוש {project.gush}{project.helka?' / חלקה '+project.helka:''}{project.migrash?' / מגרש '+project.migrash:''}</span>}
          {project.planning_committee&&<span style={{fontSize:13,color:'#4a7c5e',fontWeight:500}}>🏛 {project.planning_committee}</span>}
          {project.client_name&&<span style={{fontSize:13,color:'#8C8C8C'}}>👤 {project.client_name}</span>}
          {project.manager_id&&(()=>{const m=db.partners.find(p=>p.id===project.manager_id);return m?<span style={{fontSize:12,fontWeight:600,padding:'2px 10px',borderRadius:999,background:'#E8EDE9',color:'#065F46'}}>🧑‍💼 {project.manager_id===currentUser?.id?'אני':m.name}</span>:null;})()}
          {project.budget&&<span style={{fontSize:13,color:'#8C8C8C'}}>💰 {fmtM(project.budget)}</span>}
        </div>
      </div>
      {ms.length>0&&<div style={{background:'white',border:'1px solid #E8E6E1',borderRadius:10,padding:'10px 14px',minWidth:160,textAlign:'center'}}>
        <div style={{fontSize:11,color:'#8C8C8C',marginBottom:3}}>התקדמות</div>
        <div style={{fontSize:22,fontWeight:700,color:'#4a7c5e'}}>{prog}%</div>
        <div style={{height:4,background:'#F0F0EC',borderRadius:2,overflow:'hidden',marginTop:5}}><div style={{height:'100%',background:'#4a7c5e',width:prog+'%'}}/></div>
      </div>}
    </div>
    <div style={{display:'flex',gap:2,borderBottom:'2px solid #F0EDE8',marginBottom:20,overflowX:'auto'}}>
      {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'9px 14px',border:'none',borderBottom:tab===t.id?'2px solid #1A1A1A':'2px solid transparent',background:'none',cursor:'pointer',fontSize:13,fontWeight:tab===t.id?600:400,color:tab===t.id?'#1A1A1A':'#8C8C8C',marginBottom:-2,whiteSpace:'nowrap',fontFamily:'Heebo,sans-serif',display:'flex',alignItems:'center',gap:5}}>{t.e} {t.l}</button>)}
    </div>
    <div className="fade">
      {tab==='tasks'&&<TasksTab tasks={myT} pid={project.id} allTasks={db.tasks} allProjs={db.projects} partners={filteredPartners} db={db}/>}
      {tab==='flow'&&<FlowTab tasks={myT} projectId={project.id} allTasks={db.tasks} allProjs={db.projects} partners={filteredPartners} db={db}/>}
      {tab==='ms'&&<MilestonesTab project={project} db={db}/>}
      {tab==='docs'&&<DocsTab docs={db.docs.filter(d=>d.project_id===project.id)} pid={project.id} db={db}/>}
      {tab==='reqs'&&<ReqsTab reqs={db.reqs.filter(r=>r.project_id===project.id)} pid={project.id} db={db}/>}
      {tab==='app'&&<ApprovalsTab approvs={db.approvs.filter(a=>a.project_id===project.id)} pid={project.id} db={db}/>}
      {tab==='consultants'&&<ConsultantsTab project={project} db={db}/>}
      {tab==='cfg'&&<SettingsTab project={project} db={db} onDel={()=>{db.delProject(project.id);onBack();}} currentUser={currentUser}/>}
    </div>
  </div>;
}

// ─── New Project Modal ────────────────────────────────────────────────────────
function NewProjectModal({open,onClose,db}){
  const blank={name:'',address:'',status:'Planning',client_name:'',client_email:'',client_phone:'',budget:'',notes:'',planning_committee_id:'',gush:'',helka:'',migrash:''};
  const [form,setF]=useState(blank);
  const [selTpl,setSelTpl]=useState('');
  const u=(k,v)=>setF(f=>({...f,[k]:v}));
  const byType=db.committees.reduce((acc,c)=>{if(!acc[c.type])acc[c.type]=[];acc[c.type].push(c);return acc;},{});

  const save=()=>{
    if(!form.name.trim())return;
    const c=db.committees.find(x=>x.id===form.planning_committee_id);
    const tpl=db.templates.find(t=>t.id===selTpl);
    const milestones=tpl
      ?tpl.milestones.map(m=>({...m,completed:false,date:'',payment_status:m.payment_amount?'Unpaid':undefined}))
      :['תכנון סכמטי','פיתוח תכנון','הגשה לעירייה','אישור היתר','תחילת בנייה'].map(n=>({name:n,completed:false,date:''}));
    const newP={...form,id:uid(),planning_committee:c?c.name:'',budget:form.budget?Number(form.budget):undefined,milestones};
    db.addProject(newP);
    if(tpl){
      tpl.tasks.forEach(t=>db.addTask({...t,project_id:newP.id,status:'To Do',depends_on:[]}));
      tpl.docRequests.forEach(r=>db.addReq({...r,project_id:newP.id,status:'Pending'}));
      tpl.approvalItems.forEach(a=>db.addApp({...a,project_id:newP.id,status:'Pending'}));
    }
    setF(blank);setSelTpl('');onClose();
  };

  return<Modal open={open} onClose={onClose} title="פרויקט חדש" wide>
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      {db.templates.length>0&&<div style={{background:'#F0FDF4',border:'1px solid #BBF7D0',borderRadius:8,padding:'10px 12px'}}>
        <div style={{fontSize:12,fontWeight:600,color:'#065F46',marginBottom:6}}>📋 השתמש בתבנית קיימת</div>
        <select value={selTpl} onChange={e=>setSelTpl(e.target.value)} style={{width:'100%',height:34,padding:'0 10px',border:'1px solid #BBF7D0',borderRadius:6,fontSize:13,background:'white',fontFamily:'Heebo,sans-serif'}}>
          <option value="">— ללא תבנית —</option>
          {db.templates.map(t=><option key={t.id} value={t.id}>{t.name} (מ: {t.sourceProject})</option>)}
        </select>
        {selTpl&&<div style={{fontSize:11,color:'#065F46',marginTop:4}}>✓ ייובאו: משימות, אבני דרך, בקשות ואישורים</div>}
      </div>}
      <I label="שם הפרויקט *" value={form.name} onChange={e=>u('name',e.target.value)} placeholder="וילה כהן"/>
      <I label="כתובת" value={form.address} onChange={e=>u('address',e.target.value)} placeholder="רחוב ומספר, עיר"/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <SE label="סטטוס" value={form.status} onChange={e=>u('status',e.target.value)}>{['Planning','Permitting','Under Construction','Completed','On Hold'].map(s=><option key={s}>{s}</option>)}</SE>
        <I label="תקציב ₪" type="number" value={form.budget} onChange={e=>u('budget',e.target.value)} placeholder="0"/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <label><span style={{display:'block',fontSize:11,fontWeight:600,color:'#8C8C8C',textTransform:'uppercase',marginBottom:5}}>ועדת תכנון</span>
          <div style={{display:'flex',gap:6}}>
            <select value={form.planning_committee_id} onChange={e=>u('planning_committee_id',e.target.value)} style={{flex:1,height:38,padding:'0 10px',border:'1px solid #E8E6E1',borderRadius:7,fontSize:13,background:'white',fontFamily:'Heebo,sans-serif'}}>
              <option value="">— בחר —</option>
              {Object.entries(byType).map(([tp,list])=><optgroup key={tp} label={"ועדה "+tp}>{list.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</optgroup>)}
            </select>
            <button type="button" title="הוסף ועדה חדשה" onClick={()=>{const n=window.prompt("שם הוועדה החדשה:");if(n&&n.trim()){const id=uid();db.addCommittee({id,name:n.trim(),type:"מקומית",address:"",phone:"",email:"",contact_name:"",notes:""});u("planning_committee_id",id);}}}
              style={{height:38,padding:"0 12px",border:"1px solid #E8E6E1",borderRadius:7,background:"white",cursor:"pointer",fontSize:18,color:"#3D7A5A",flexShrink:0}}>+</button>
          </div>
        </label>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
          <I label="גוש" value={form.gush} onChange={e=>u('gush',e.target.value)} placeholder="מס' גוש"/>
          <I label="חלקה" value={form.helka} onChange={e=>u('helka',e.target.value)} placeholder="מס' חלקה"/>
          <I label="מגרש" value={form.migrash} onChange={e=>u('migrash',e.target.value)} placeholder="מס' מגרש"/>
        </div>
      </div>
      <div style={{borderTop:'1px solid #F5F5F3',paddingTop:10}}>
        <div style={{fontSize:11,fontWeight:600,color:'#8C8C8C',textTransform:'uppercase',marginBottom:10}}>פרטי לקוח</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <I label="שם לקוח" value={form.client_name} onChange={e=>u('client_name',e.target.value)} placeholder="שם מלא"/>
          <I label="אימייל" value={form.client_email} onChange={e=>u('client_email',e.target.value)} placeholder="email@example.com"/>
          <I label="טלפון" value={form.client_phone} onChange={e=>u('client_phone',e.target.value)} placeholder="050-0000000"/>
        </div>
      </div>
      <TA label="הערות" value={form.notes} onChange={e=>u('notes',e.target.value)} rows={2}/>
      <div style={{display:'flex',gap:8,paddingTop:4}}>
        <Btn sz="lg" sx={{flex:1}} onClick={save} disabled={!form.name.trim()}>צור פרויקט</Btn>
        <Btn v="outline" sz="lg" onClick={onClose}>ביטול</Btn>
      </div>
    </div>
  </Modal>;
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function Dashboard({db,nav,onNew,onOpen,setPortalPid}){
  const [search,setS]=useState('');
  const [fSt,setFSt]=useState('All');
  const [fC,setFC]=useState('All');
  const [fU,setFU]=useState('All');
  const [fP,setFP]=useState('All');

  const filtered=db.projects.filter(p=>{
    const ms=(p.name+' '+(p.client_name||'')).toLowerCase().includes(search.toLowerCase());
    const mst=fSt==='All'||p.status===fSt;
    const mc=fC==='All'||p.planning_committee_id===fC;
    const mu=fU==='All'||db.tasks.some(t=>t.project_id===p.id&&t.assignee_id===fU&&t.status!=='Done');
    const mp=fP==='All'||db.tasks.some(t=>t.project_id===p.id&&t.priority===fP&&t.status!=='Done');
    return ms&&mst&&mc&&mu&&mp;
  });

  const active=db.projects.filter(p=>p.status!=='Completed'&&p.status!=='On Hold').length;
  const done=db.tasks.filter(t=>t.status==='Done').length;
  const overdue=db.tasks.filter(t=>t.deadline&&new Date(t.deadline)<new Date()&&t.status!=='Done').length;
  const STATS=[{l:'פרויקטים פעילים',v:active,bg:'#E8EDE9',col:'#4a7c5e',e:'📁'},{l:'סה״כ משימות',v:db.tasks.length,bg:'#FFFBEB',col:'#B45309',e:'☑️'},{l:'הושלמו',v:done,bg:'#E8EDE9',col:'#4a7c5e',e:'✅'},{l:'באיחור',v:overdue,bg:'#FEF2F2',col:'#DC2626',e:'⚠️'}];
  const activeF=[fSt!=='All',fC!=='All',fU!=='All',fP!=='All'].filter(Boolean).length;

  const FS=({val,onChange,children})=><select value={val} onChange={onChange} style={{height:34,padding:'0 8px',border:'1px solid '+(val!=='All'?'#4a7c5e':'#E8E6E1'),borderRadius:7,fontSize:12,background:val!=='All'?'#E8EDE9':'white',fontFamily:'Heebo,sans-serif',color:val!=='All'?'#065F46':'#6B7280',fontWeight:val!=='All'?600:400}}>{children}</select>;

  return<div>
    <div style={{marginBottom:20}}><h1 style={{fontSize:28,fontWeight:700,marginBottom:3,fontFamily:"'DM Sans',sans-serif",letterSpacing:'-.02em'}}>לוח בקרה</h1><p style={{color:'var(--text2)',fontSize:14}}>ניהול פרויקטים — משרד אדריכלות</p></div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:20}}>
      {STATS.map(s=><div key={s.l} style={{background:'white',borderRadius:10,border:'1px solid #E8E6E1',padding:14}}>
        <div style={{width:32,height:32,borderRadius:8,background:s.bg,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:8,fontSize:15}}>{s.e}</div>
        <div style={{fontSize:22,fontWeight:700,marginBottom:2}}>{s.v}</div>
        <div style={{fontSize:11,color:'#8C8C8C',textTransform:'uppercase',letterSpacing:'.04em'}}>{s.l}</div>
      </div>)}
    </div>

    <div style={{background:'white',border:'1px solid #E8E6E1',borderRadius:10,padding:'10px 14px',marginBottom:16,display:'flex',flexWrap:'wrap',gap:8,alignItems:'center'}}>
      <input value={search} onChange={e=>setS(e.target.value)} placeholder="🔍 חיפוש..." style={{height:34,padding:'0 10px',border:'1px solid #E8E6E1',borderRadius:7,fontSize:13,background:'#FAFAF8',width:155,fontFamily:'Heebo,sans-serif'}}/>
      <FS val={fSt} onChange={e=>setFSt(e.target.value)}>
        <option value="All">כל הסטטוסים</option>
        {['Planning','Permitting','Under Construction','Completed','On Hold'].map(s=><option key={s}>{s}</option>)}
      </FS>
      {db.committees.length>0&&<FS val={fC} onChange={e=>setFC(e.target.value)}>
        <option value="All">כל הועדות</option>
        {db.committees.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
      </FS>}
      <FS val={fU} onChange={e=>setFU(e.target.value)}>
        <option value="All">כל האחראים</option>
        {db.partners.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
      </FS>
      <FS val={fP} onChange={e=>setFP(e.target.value)}>
        <option value="All">כל הדחיפויות</option>
        <option value="High">⚡ High — דחוף</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </FS>
      {activeF>0&&<button onClick={()=>{setFSt('All');setFC('All');setFU('All');setFP('All');setS('');}} style={{height:34,padding:'0 10px',borderRadius:7,border:'1px solid #FECACA',background:'#FEF2F2',color:'#DC2626',fontSize:12,cursor:'pointer',fontFamily:'Heebo,sans-serif'}}>× נקה ({activeF})</button>}
      <div style={{flex:1}}/><Btn onClick={onNew}>+ פרויקט חדש</Btn>
    </div>
    <div style={{fontSize:12,color:'#8C8C8C',marginBottom:10}}>{filtered.length} פרויקטים</div>

    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(270px,1fr))',gap:14}}>
      {filtered.map(p=>{
        const ms=p.milestones||[],done=ms.filter(m=>m.completed).length,prog=ms.length?Math.round(done/ms.length*100):0;
        const hp=db.tasks.filter(t=>t.project_id===p.id&&t.priority==='High'&&t.status!=='Done').length;
        return<div key={p.id} onClick={()=>onOpen(p.id)} className="hc" style={{background:'white',borderRadius:12,border:'1px solid #E8E6E1',cursor:'pointer',overflow:'hidden',transition:'all .2s'}}>
          <div style={{height:88,background:'linear-gradient(135deg,#F5F5F3,#E8E6E1)',position:'relative',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <div style={{opacity:.07,fontSize:10,lineHeight:2.2}}>—————— ——————</div>
            <div style={{position:'absolute',top:8,right:8}}><SBadge status={p.status}/></div>
            {hp>0&&<div style={{position:'absolute',top:8,left:8,background:'#EF4444',color:'white',fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:999}}>⚡ {hp}</div>}
          </div>
          <div style={{padding:12}}>
            <div style={{fontSize:14,fontWeight:600,marginBottom:3}}>{p.name}</div>
            {p.address&&<div style={{fontSize:12,color:'#8C8C8C',marginBottom:2}}>📍 {p.address}</div>}
            {p.client_name&&<div style={{fontSize:12,color:'#8C8C8C',marginBottom:2}}>👤 {p.client_name}</div>}
            {p.planning_committee&&<div style={{fontSize:11,color:'#4a7c5e',fontWeight:500,marginBottom:4,cursor:'pointer'}} onClick={()=>nav.toDashboard()}>🏛 {p.planning_committee}</div>}
            {p.manager_id&&(()=>{const m=db.partners.find(pt=>pt.id===p.manager_id);return m?<div style={{fontSize:11,color:'#6B6B6B',marginBottom:4,cursor:'pointer'}} onClick={e=>{e.stopPropagation();nav.toDashboard();}}>🧑‍💼 {p.manager_id===db.partners[0].id?'אני':m.name}</div>:null;})()}
            {ms.length>0&&<div><div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}><span style={{fontSize:11,color:'#8C8C8C'}}>התקדמות</span><span style={{fontSize:11,fontWeight:600}}>{prog}%</span></div><div style={{height:3,background:'#F0F0EC',borderRadius:2,overflow:'hidden',marginBottom:8}}><div style={{height:'100%',background:'#4a7c5e',width:prog+'%'}}/></div><button onClick={e=>{e.stopPropagation();onOpen(p.id);setTimeout(()=>setPortalPid(p.id),50);}} style={{width:'100%',height:28,background:'#EBF4EF',border:'none',borderRadius:6,fontSize:11,fontWeight:600,color:'#3D7A5A',cursor:'pointer',fontFamily:'Heebo,sans-serif'}}>👁 פורטל לקוח</button></div>}
          </div>
        </div>;
      })}
      {filtered.length===0&&<div style={{gridColumn:'1/-1',textAlign:'center',padding:60,color:'#8C8C8C'}}><div style={{fontSize:36,marginBottom:8}}>📁</div><div>לא נמצאו פרויקטים</div></div>}
    </div>
  </div>;
}

// ─── All Tasks Page ───────────────────────────────────────────────────────────
function AllTasksPage({db,nav}){
  const [fp,setFP]=useState('all');const [oid,setOID]=useState(null);
  const tasks=fp==='all'?db.tasks:db.tasks.filter(t=>t.project_id===fp);
  const PRI={'Low':'#9CA3AF','Medium':'#F59E0B','High':'#EF4444'};
  const ot=oid?db.tasks.find(t=>t.id===oid):null;
  return<div>
    {ot&&<TaskModal task={ot} allTasks={db.tasks} allProjects={db.projects} partners={filteredPartners} onUpdate={db.updTask} onClose={()=>setOID(null)} onJumpToTask={id=>setOID(id)} db={db}/>}
    <h1 style={{fontSize:26,fontWeight:600,marginBottom:3}}>כל המשימות</h1>
    <p style={{fontSize:14,color:'#8C8C8C',marginBottom:18}}>מבט כולל על כל הפרויקטים</p>
    <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
      {[{id:'all',name:'הכל'},...db.projects].map(p=><button key={p.id} onClick={()=>setFP(p.id)} style={{height:32,padding:'0 10px',borderRadius:7,fontSize:12,fontWeight:500,border:fp===p.id?'none':'1px solid #E8E6E1',background:fp===p.id?'#1A1A1A':'white',color:fp===p.id?'white':'#6B6B6B',cursor:'pointer',fontFamily:'Heebo,sans-serif'}}>{p.name}</button>)}
    </div>
    <div style={{background:'white',border:'1px solid #E8E6E1',borderRadius:12,overflow:'hidden'}}>
      {tasks.length===0&&<div style={{padding:48,textAlign:'center',color:'#8C8C8C'}}>אין משימות</div>}
      {tasks.map((t,i)=>{
        const proj=db.projects.find(p=>p.id===t.project_id),asgn=db.partners.find(p=>p.id===t.assignee_id);
        const od=t.deadline&&new Date(t.deadline)<new Date()&&t.status!=='Done';
        const SC={'Done':{bg:'#ECFDF5',col:'#065F46'},'In Progress':{bg:'#FFFBEB',col:'#B45309'},'To Do':{bg:'#F3F4F6',col:'#6B7280'}};
        const sc=SC[t.status];
        const bl=(t.depends_on||[]).some(id=>{const d=db.tasks.find(x=>x.id===id);return d&&d.status!=='Done';});
        return<div key={t.id} onClick={()=>setOID(t.id)} className="hr" style={{display:'flex',alignItems:'center',gap:10,padding:'9px 14px',borderTop:i>0?'1px solid #F5F5F3':'none',cursor:'pointer'}}>
          <div style={{width:18,height:18,borderRadius:'50%',border:'2px solid '+(t.status==='Done'?'#4a7c5e':t.status==='In Progress'?'#F59E0B':'#D0CEC9'),background:t.status==='Done'?'#4a7c5e':'white',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
            {t.status==='Done'&&<span style={{color:'white',fontSize:9,fontWeight:700}}>✓</span>}
          </div>
          <span style={{flex:1,fontSize:13,color:t.status==='Done'?'#B0B0B0':'#1A1A1A',textDecoration:t.status==='Done'?'line-through':''}}>{t.title}</span>
          {proj&&<span style={{fontSize:11,color:'#8C8C8C',flexShrink:0}}>{proj.name}</span>}
          {asgn&&<Av u={asgn} size={22}/>}
          <span style={{color:PRI[t.priority||'Medium'],fontSize:12,flexShrink:0}}>●</span>
          {t.deadline&&<span style={{fontSize:11,color:od?'#EF4444':'#8C8C8C',flexShrink:0,fontWeight:od?600:400}}>{fmtD(t.deadline)}</span>}
          {bl&&<span style={{fontSize:11,color:'#EF4444',fontWeight:600,flexShrink:0}}>⛔</span>}
          <span style={{fontSize:11,fontWeight:600,padding:'2px 7px',borderRadius:999,background:sc.bg,color:sc.col,flexShrink:0}}>{t.status==='Done'?'הושלם':t.status==='In Progress'?'בתהליך':'להתחלה'}</span>
        </div>;
      })}
    </div>
  </div>;
}

// ─── Partners Page ────────────────────────────────────────────────────────────
function PartnersPage({db,nav}){
  return<div>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
      <h1 style={{fontSize:26,fontWeight:600}}>צוות המשרד</h1>
      <Btn v="outline" onClick={()=>nav('appsettings')}>⚙ ניהול משתמשים</Btn>
    </div>
    <p style={{fontSize:14,color:'#8C8C8C',marginBottom:22}}>רשימת חברי הצוות מנוהלת דרך הגדרות המשרד</p>

    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:12}}>
      {db.partners.map(p=>{
        const myT=db.tasks.filter(t=>t.assignee_id===p.id&&t.status!=='Done');
        const doneT=db.tasks.filter(t=>t.assignee_id===p.id&&t.status==='Done');
        const ROLE_COLORS={'admin':'#1D4ED8','manager':'#065F46','drafter':'#B45309','client':'#6B7280'};
        const om=db.officeMembers.find(m=>m.email===p.email);
        const roleHe={'admin':'מנהל ראשי','manager':'מנהל משרד','drafter':'שרטט','client':'לקוח'};
        return<div key={p.id} style={{background:'white',border:'1px solid #E8E6E1',borderRadius:12,padding:16}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
            {p.picture
              ?<img src={p.picture} style={{width:44,height:44,borderRadius:'50%',flexShrink:0}} alt=""/>
              :<Av name={p.name} size={44} color={p.color}/>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,fontSize:14}}>{p.name}</div>
              <div style={{fontSize:12,color:'#8C8C8C'}}>{p.email||''}</div>
              <span style={{fontSize:11,fontWeight:600,padding:'2px 8px',borderRadius:999,
                background:'#F0F0F0',color:ROLE_COLORS[om?.role]||'#6B7280'}}>
                {roleHe[om?.role]||p.role}
              </span>
            </div>
          </div>
          <div style={{display:'flex',gap:16,fontSize:12,color:'#6B6B6B',borderTop:'1px solid #F5F5F3',paddingTop:8}}>
            <span>🔄 {myT.length} משימות פתוחות</span>
            <span>✓ {doneT.length} הושלמו</span>
          </div>
        </div>;
      })}
    </div>
    {db.partners.length===0&&<div style={{textAlign:'center',padding:60,color:'#B0B0B0',fontSize:14}}>
      אין חברי צוות עדיין.<br/>
      <Btn v="outline" sx={{marginTop:12}} onClick={()=>nav('appsettings')}>הוסף דרך הגדרות</Btn>
    </div>}
  </div>;
}

function CommitteesPage({db,nav}){
  const [sf,setSF]=useState(false);const [form,setF]=useState({name:'',type:'מקומית',region:''});const [eid,setEID]=useState(null);
  const u=(k,v)=>setF(f=>({...f,[k]:v}));
  const save=()=>{if(!form.name.trim())return;if(eid)db.updCommittee(eid,form);else db.addCommittee(form);setF({name:'',type:'מקומית',region:''});setEID(null);setSF(false);};
  const edit=c=>{setF({name:c.name,type:c.type,region:c.region||''});setEID(c.id);setSF(true);};
  const TC={'מקומית':'#EFF6FF|#1D4ED8','מחוזית':'#FFFBEB|#B45309','ארצית':'#F5F3FF|#6D28D9','אחרת':'#F3F4F6|#6B7280'};
  return<div>
    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:20}}>
      <div><h1 style={{fontSize:26,fontWeight:600,marginBottom:3}}>ועדות תכנון</h1><p style={{fontSize:14,color:'#8C8C8C'}}>הרשימה ריקה — הוסף ועדות לפי הפרויקטים שלך</p></div>
      <Btn onClick={()=>{setSF(true);setEID(null);setF({name:'',type:'מקומית',region:''});}}>+ ועדה חדשה</Btn>
    </div>
    {sf&&<div className="fade" style={{background:'white',border:'1px solid #E8E6E1',borderRadius:12,padding:18,marginBottom:18}}>
      <div style={{fontSize:14,fontWeight:600,marginBottom:12}}>{eid?'עריכה':'ועדה חדשה'}</div>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:10,marginBottom:10}}>
        <I label="שם הועדה" value={form.name} onChange={e=>u('name',e.target.value)} placeholder='ועדה מקומית — רעננה'/>
        <SE label="סוג" value={form.type} onChange={e=>u('type',e.target.value)}>{['מקומית','מחוזית','ארצית','אחרת'].map(t=><option key={t}>{t}</option>)}</SE>
      </div>
      <I label="אזור (אופציונלי)" value={form.region} onChange={e=>u('region',e.target.value)} placeholder="מרכז, תל אביב..."/>
      <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:10}}><Btn v="ghost" sz="sm" onClick={()=>{setSF(false);setEID(null);}}>ביטול</Btn><Btn sz="sm" onClick={save} disabled={!form.name.trim()}>{eid?'שמור':'הוסף'}</Btn></div>
    </div>}
    <div style={{background:'white',border:'1px solid #E8E6E1',borderRadius:12,overflow:'hidden'}}>
      <div style={{padding:'10px 16px',background:'#FAFAF8',borderBottom:'1px solid #F0EDE8',fontSize:12,fontWeight:600,color:'#8C8C8C'}}>סה"כ {db.committees.length} ועדות</div>
      {db.committees.length===0&&<div style={{padding:60,textAlign:'center',color:'#8C8C8C'}}><div style={{fontSize:40,marginBottom:10}}>🏛</div><div style={{fontSize:15,marginBottom:6}}>אין ועדות עדיין</div><div style={{fontSize:13}}>לחץ "+ ועדה חדשה" כדי להוסיף</div></div>}
      {db.committees.map((c,i)=>{const [bg,col]=(TC[c.type]||TC['אחרת']).split('|');return<div key={c.id} className="hr" style={{display:'flex',alignItems:'center',gap:10,padding:'11px 16px',borderTop:i>0?'1px solid #F5F5F3':'none'}}>
        <span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:999,flexShrink:0,background:bg,color:col}}>{c.type}</span>
        <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{c.name}</div>{c.region&&<div style={{fontSize:11,color:'#8C8C8C'}}>אזור: {c.region}</div>}</div>
        <div style={{display:'flex',gap:4}}><Btn v="ghost" sz="sm" onClick={()=>edit(c)}>✏️</Btn><Btn v="ghost" sz="sm" sx={{color:'#EF4444'}} onClick={()=>window.confirm('למחוק?')&&db.delCommittee(c.id)}>🗑</Btn></div>
      </div>;})}
    </div>
  </div>;
}

// CLIENT PORTAL — standalone view, minimal, warm, non-intimidating
// ═══════════════════════════════════════════════════════════════════════════
function ClientPortal({project,db,onClose}){
  const [tab,setTab]=useState('overview');
  const [uploading,setUploading]=useState(null);
  const [commentText,setComment]=useState('');

  const ms=project.milestones||[];
  const prog=ms.length?Math.round(ms.filter(m=>m.completed).length/ms.length*100):0;
  const myReqs=db.reqs.filter(r=>r.project_id===project.id);
  const myApp=db.approvs.filter(a=>a.project_id===project.id);
  const pendingReqs=myReqs.filter(r=>r.status==='Pending').length;
  const pendingApp=myApp.filter(a=>a.status==='Pending').length;
  const mgr=db.partners.find(p=>p.id===project.manager_id);

  const simulateUpload=rid=>{
    setUploading(rid);
    setTimeout(()=>{db.updReq(rid,{status:'Uploaded'});setUploading(null);},1200);
  };
  const submitComment=(aid)=>{
    if(!commentText.trim())return;
    db.updApp(aid,{client_comment:commentText.trim(),status:'Changes Requested'});
    setComment('');
  };

  const TABS=[
    {id:'overview', label:'סקירה',    icon:'🏠', badge:0},
    {id:'progress', label:'התקדמות',  icon:'📍', badge:0},
    {id:'docs',     label:'מסמכים',   icon:'📎', badge:pendingReqs},
    {id:'approvals',label:'לאישורך',  icon:'✅', badge:pendingApp},
  ];

  return(
    <div style={{position:'fixed',inset:0,zIndex:300,background:'#F8F6F1',overflowY:'auto',direction:'rtl'}}>
      {/* Top bar */}
      <div style={{background:'white',borderBottom:'1px solid #E8E3DC',position:'sticky',top:0,zIndex:10}}>
        <div style={{maxWidth:720,margin:'0 auto',padding:'0 24px',height:64,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:36,height:36,background:'linear-gradient(135deg,#3D7A5A,#2A5740)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🏗</div>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:'#1A1A1A',lineHeight:1.2}}>{project.name}</div>
              <div style={{fontSize:11,color:'#9C9C9C'}}>פורטל לקוח</div>
            </div>
          </div>
          <button onClick={onClose} style={{background:'#F0EDE8',border:'none',borderRadius:8,padding:'6px 14px',fontSize:12,color:'#6B6B6B',cursor:'pointer',fontFamily:'Heebo,sans-serif',fontWeight:500}}>← חזרה למשרד</button>
        </div>
      </div>

      {/* Hero greeting */}
      <div style={{background:'linear-gradient(160deg,#2A5740 0%,#3D7A5A 60%,#4E9470 100%)',padding:'32px 24px 40px',color:'white'}}>
        <div style={{maxWidth:720,margin:'0 auto'}}>
          <div style={{fontSize:13,opacity:.7,marginBottom:6,letterSpacing:'.04em'}}>שלום, {project.client_name||'לקוח יקר'} 👋</div>
          <h1 style={{fontSize:26,fontWeight:700,marginBottom:8,fontFamily:"'DM Sans',sans-serif",letterSpacing:'-.02em'}}>{project.name}</h1>
          <div style={{fontSize:13,opacity:.75,marginBottom:20}}>{project.address}</div>

          {/* Progress ring area */}
          <div style={{display:'flex',alignItems:'center',gap:20,background:'rgba(255,255,255,.12)',borderRadius:14,padding:'16px 20px',backdropFilter:'blur(8px)'}}>
            {/* Big progress */}
            <div style={{textAlign:'center',flexShrink:0}}>
              <div style={{fontSize:36,fontWeight:800,lineHeight:1}}>{prog}%</div>
              <div style={{fontSize:11,opacity:.7,marginTop:2}}>הושלם</div>
            </div>
            <div style={{width:1,height:48,background:'rgba(255,255,255,.2)'}}/>
            {/* Milestones */}
            <div style={{flex:1}}>
              <div style={{height:8,background:'rgba(255,255,255,.2)',borderRadius:4,overflow:'hidden',marginBottom:6}}>
                <div style={{height:'100%',background:'white',width:prog+'%',borderRadius:4,transition:'width 1s ease'}}/>
              </div>
              <div style={{fontSize:12,opacity:.8}}>{ms.filter(m=>m.completed).length} מתוך {ms.length} אבני דרך הושלמו</div>
            </div>
            {/* Status badge */}
            <div style={{background:'rgba(255,255,255,.18)',borderRadius:8,padding:'6px 12px',fontSize:12,fontWeight:600,flexShrink:0}}>{project.status}</div>
          </div>

          {/* Action alerts */}
          {(pendingReqs>0||pendingApp>0)&&<div style={{marginTop:14,display:'flex',gap:10,flexWrap:'wrap'}}>
            {pendingReqs>0&&<div style={{background:'rgba(255,200,0,.18)',border:'1px solid rgba(255,200,0,.3)',borderRadius:8,padding:'8px 14px',fontSize:12,fontWeight:600,cursor:'pointer'}} onClick={()=>setTab('docs')}>
              📎 {pendingReqs} מסמכים ממתינים להעלאה
            </div>}
            {pendingApp>0&&<div style={{background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.25)',borderRadius:8,padding:'8px 14px',fontSize:12,fontWeight:600,cursor:'pointer'}} onClick={()=>setTab('approvals')}>
              ✅ {pendingApp} פריטים ממתינים לאישורך
            </div>}
          </div>}
        </div>
      </div>

      {/* Tabs */}
      <div style={{background:'white',borderBottom:'1px solid #E8E3DC',position:'sticky',top:64,zIndex:9}}>
        <div style={{maxWidth:720,margin:'0 auto',padding:'0 24px',display:'flex',gap:4}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{padding:'14px 16px',border:'none',borderBottom:tab===t.id?'2px solid #3D7A5A':'2px solid transparent',background:'none',cursor:'pointer',fontSize:13,fontWeight:tab===t.id?700:400,color:tab===t.id?'#3D7A5A':'#8C8C8C',display:'flex',alignItems:'center',gap:6,fontFamily:'Heebo,sans-serif',marginBottom:-1,transition:'color .15s',position:'relative'}}>
              {t.icon} {t.label}
              {t.badge>0&&<span style={{background:'#EF4444',color:'white',borderRadius:999,fontSize:10,fontWeight:700,padding:'1px 6px',minWidth:18,textAlign:'center'}}>{t.badge}</span>}
            </button>
          ))}
        </div>
      </div>

      {/* Content */}
      <div style={{maxWidth:720,margin:'0 auto',padding:'28px 24px 60px'}} className="fade">

        {/* ── OVERVIEW ── */}
        {tab==='overview'&&<div style={{display:'flex',flexDirection:'column',gap:16}}>
          {/* Project details card */}
          <div style={{background:'white',borderRadius:14,border:'1px solid #E8E3DC',overflow:'hidden',boxShadow:'0 1px 4px rgba(0,0,0,.04)'}}>
            <div style={{padding:'16px 20px',borderBottom:'1px solid #F0EDE8',fontSize:13,fontWeight:700,color:'#1A1A1A'}}>פרטי הפרויקט</div>
            <div style={{padding:'16px 20px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
              {[
                {l:'כתובת',v:project.address,e:'📍'},
                {l:'סטטוס',v:project.status,e:'📌'},
                {l:'תחילת עבודה',v:project.start_date?new Date(project.start_date).toLocaleDateString('he-IL'):'—',e:'📅'},
                {l:'יעד סיום',v:project.target_completion?new Date(project.target_completion).toLocaleDateString('he-IL'):'—',e:'🎯'},
              ].map(({l,v,e})=>v&&v!=='—'?<div key={l}>
                <div style={{fontSize:11,color:'#9C9C9C',fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em',marginBottom:3}}>{l}</div>
                <div style={{fontSize:13,color:'#1A1A1A',fontWeight:500}}>{e} {v}</div>
              </div>:null)}
            </div>
          </div>

          {/* Manager card */}
          {mgr&&<div style={{background:'white',borderRadius:14,border:'1px solid #E8E3DC',padding:'16px 20px',display:'flex',alignItems:'center',gap:14,boxShadow:'0 1px 4px rgba(0,0,0,.04)'}}>
            <div style={{width:48,height:48,borderRadius:'50%',background:mgr.color,display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:700,fontSize:20,flexShrink:0}}>{mgr.name[0]}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:11,color:'#9C9C9C',fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em',marginBottom:2}}>מנהל הפרויקט שלך</div>
              <div style={{fontSize:15,fontWeight:700,color:'#1A1A1A'}}>{mgr.name}</div>
              <div style={{fontSize:12,color:'#6B6B6B'}}>{mgr.role}</div>
            </div>
            {mgr.email&&<a href={'mailto:'+mgr.email} style={{background:'#EBF4EF',color:'#3D7A5A',borderRadius:8,padding:'8px 14px',fontSize:12,fontWeight:600,textDecoration:'none'}}>📧 שלח מייל</a>}
          </div>}

          {/* Quick actions */}
          {(pendingReqs>0||pendingApp>0)&&<div>
            <div style={{fontSize:12,fontWeight:700,color:'#9C9C9C',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10}}>נדרשת פעולה ממך</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {pendingReqs>0&&<button onClick={()=>setTab('docs')} style={{background:'white',border:'2px solid #FCA5A5',borderRadius:12,padding:'14px 18px',display:'flex',alignItems:'center',gap:12,cursor:'pointer',fontFamily:'Heebo,sans-serif',textAlign:'right',transition:'all .15s'}} onMouseOver={e=>e.currentTarget.style.background='#FFF5F5'} onMouseOut={e=>e.currentTarget.style.background='white'}>
                <div style={{width:40,height:40,background:'#FEF2F2',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>📎</div>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:'#1A1A1A',marginBottom:2}}>העלה {pendingReqs} מסמכים</div><div style={{fontSize:12,color:'#9C9C9C'}}>המשרד מחכה למסמכים שלך</div></div>
                <div style={{fontSize:11,color:'#EF4444',fontWeight:700}}>← לחץ להעלאה</div>
              </button>}
              {pendingApp>0&&<button onClick={()=>setTab('approvals')} style={{background:'white',border:'2px solid #86EFAC',borderRadius:12,padding:'14px 18px',display:'flex',alignItems:'center',gap:12,cursor:'pointer',fontFamily:'Heebo,sans-serif',textAlign:'right',transition:'all .15s'}} onMouseOver={e=>e.currentTarget.style.background='#F0FDF4'} onMouseOut={e=>e.currentTarget.style.background='white'}>
                <div style={{width:40,height:40,background:'#ECFDF5',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>✅</div>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:'#1A1A1A',marginBottom:2}}>אשר {pendingApp} פריטים</div><div style={{fontSize:12,color:'#9C9C9C'}}>תוכניות וחומרים לבדיקתך</div></div>
                <div style={{fontSize:11,color:'#3D7A5A',fontWeight:700}}>← לחץ לאישור</div>
              </button>}
            </div>
          </div>}

          {pendingReqs===0&&pendingApp===0&&<div style={{background:'#F0FDF4',border:'1px solid #BBF7D0',borderRadius:12,padding:'16px 20px',display:'flex',alignItems:'center',gap:12}}>
            <span style={{fontSize:24}}>✨</span>
            <div><div style={{fontSize:13,fontWeight:600,color:'#065F46'}}>אין פעולות ממתינות</div><div style={{fontSize:12,color:'#6B9E7E'}}>הכל תקין — המשרד יעדכן אותך בהמשך</div></div>
          </div>}
        </div>}

        {/* ── PROGRESS ── */}
        {tab==='progress'&&<div style={{display:'flex',flexDirection:'column',gap:10}}>
          <div style={{fontSize:13,color:'#6B6B6B',marginBottom:6}}>מסע הפרויקט שלך — שלב אחר שלב</div>
          {ms.map((m,i)=>{
            const isNext=!m.completed&&(i===0||ms[i-1]?.completed);
            return<div key={i} style={{background:'white',borderRadius:12,border:'1px solid '+(m.completed?'#BBF7D0':isNext?'#FCA5A5':'#E8E3DC'),padding:'14px 18px',display:'flex',alignItems:'center',gap:14,boxShadow:'0 1px 3px rgba(0,0,0,.03)',transition:'all .2s'}}>
              {/* Circle */}
              <div style={{width:36,height:36,borderRadius:'50%',background:m.completed?'#3D7A5A':isNext?'#FEF2F2':'#F5F5F3',border:'2px solid '+(m.completed?'#3D7A5A':isNext?'#FCA5A5':'#E0DDD8'),display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:16}}>
                {m.completed?'✓':isNext?'→':String(i+1)}
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:m.completed?500:600,color:m.completed?'#6B6B6B':'#1A1A1A',textDecoration:m.completed?'line-through':''}}>{m.name}</div>
                {m.completed&&m.date&&<div style={{fontSize:11,color:'#3D7A5A',marginTop:2}}>✓ הושלם {new Date(m.date).toLocaleDateString('he-IL')}</div>}
                {isNext&&<div style={{fontSize:11,color:'#DC2626',marginTop:2,fontWeight:600}}>← השלב הבא</div>}
              </div>
              {m.payment_amount&&<div style={{fontSize:12,fontWeight:600,color:m.payment_status==='Paid'?'#3D7A5A':'#9C9C9C',flexShrink:0,background:m.payment_status==='Paid'?'#EBF4EF':'#F5F5F3',padding:'4px 10px',borderRadius:8}}>{m.payment_status==='Paid'?'שולם':'ממתין'}</div>}
            </div>;
          })}
          {ms.length===0&&<div style={{background:'white',borderRadius:12,border:'1px solid #E8E3DC',padding:40,textAlign:'center',color:'#9C9C9C'}}>אין אבני דרך עדיין</div>}
        </div>}

        {/* ── DOCUMENTS ── */}
        {tab==='docs'&&<div style={{display:'flex',flexDirection:'column',gap:10}}>
          {myReqs.length===0&&<div style={{background:'white',borderRadius:12,border:'1px solid #E8E3DC',padding:48,textAlign:'center',color:'#9C9C9C'}}><div style={{fontSize:32,marginBottom:8}}>📋</div><div>אין בקשות מסמכים כרגע</div></div>}
          {myReqs.map(r=>{
            const ST={Pending:{bg:'#FFF7ED',col:'#C2410C',icon:'⏳',label:'ממתין להעלאה',action:true},Uploaded:{bg:'#EFF6FF',col:'#1D4ED8',icon:'📤',label:'הועלה — בבדיקה',action:false},Approved:{bg:'#ECFDF5',col:'#065F46',icon:'✅',label:'אושר',action:false},Rejected:{bg:'#FEF2F2',col:'#DC2626',icon:'❌',label:'נדרשת הגשה מחדש',action:true}};
            const s=ST[r.status]||ST.Pending;
            return<div key={r.id} style={{background:s.bg,borderRadius:12,border:'1px solid '+(r.status==='Pending'?'#FED7AA':r.status==='Approved'?'#BBF7D0':'#E8E3DC'),padding:'16px 18px'}}>
              <div style={{display:'flex',alignItems:'flex-start',gap:12}}>
                <div style={{fontSize:24,flexShrink:0,marginTop:2}}>{s.icon}</div>
                <div style={{flex:1}}>

              {a.status==='Pending'&&<div style={{display:'flex',gap:8,marginTop:4}}>
                <button onClick={()=>db.updApp(a.id,{status:'Approved',client_comment:''})}
                  style={{flex:1,height:44,background:'#3D7A5A',color:'white',border:'none',borderRadius:10,fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'Heebo,sans-serif',transition:'opacity .15s'}} onMouseOver={e=>e.currentTarget.style.opacity='.85'} onMouseOut={e=>e.currentTarget.style.opacity='1'}>
                  ✓ מאשר
                </button>
                <div style={{flex:2,display:'flex',gap:6}}>
                  <input value={commentText} onChange={e=>setComment(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submitComment(a.id)}
                    placeholder="כתוב הערה לשינוי..." style={{flex:1,height:44,padding:'0 12px',border:'1px solid #E8E3DC',borderRadius:10,fontSize:13,fontFamily:'Heebo,sans-serif',outline:'none'}}/>
                  <button onClick={()=>submitComment(a.id)} disabled={!commentText.trim()}
                    style={{height:44,padding:'0 14px',background:commentText.trim()?'#FFF7ED':'#F5F5F3',color:commentText.trim()?'#C2410C':'#C0C0C0',border:'1px solid '+(commentText.trim()?'#FED7AA':'#E8E3DC'),borderRadius:10,fontSize:13,fontWeight:600,cursor:commentText.trim()?'pointer':'default',fontFamily:'Heebo,sans-serif'}}>
                    שלח
                  </button>
                </div>
              </div>}
            </div>;
          })}
        </div>}

      </div>

      {/* Bottom bar — contact */}
      <div style={{background:'white',borderTop:'1px solid #E8E3DC',padding:'14px 24px',position:'sticky',bottom:0}}>
        <div style={{maxWidth:720,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
          <div style={{fontSize:12,color:'#9C9C9C'}}>שאלות? המשרד זמין עבורך</div>
          <div style={{display:'flex',gap:8}}>
            {mgr?.email&&<a href={'mailto:'+mgr.email} style={{background:'#EBF4EF',color:'#3D7A5A',borderRadius:8,padding:'7px 14px',fontSize:12,fontWeight:600,textDecoration:'none'}}>📧 מייל</a>}
            {mgr&&db.partners.find(p=>p.id===mgr.id)?.phone&&<a href={'tel:'+db.partners.find(p=>p.id===mgr.id).phone} style={{background:'#EBF4EF',color:'#3D7A5A',borderRadius:8,padding:'7px 14px',fontSize:12,fontWeight:600,textDecoration:'none'}}>📞 טלפון</a>}
          </div>
        </div>
      </div>
    </div>
  );
}

function LeadsPage({db,nav}){

      <TA label="הערות" value={form.notes} onChange={e=>u('notes',e.target.value)} rows={2}/>

        {db.leads.map(l=><div key={l.id} onClick={()=>setSel(sel===l.id?null:l.id)}
          className="hc card" style={{padding:'14px 16px',marginBottom:10,cursor:'pointer',borderColor:sel===l.id?'#3D7A5A':'',background:sel===l.id?'#F0FDF4':'white'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>

          <div style={{display:'flex',gap:12,fontSize:12,color:'#8C8C8C',flexWrap:'wrap'}}>
            {l.phone&&<span>📞 {l.phone}</span>}

          </div>

      </div>
      {lead&&<div className="card fade" style={{padding:18}}>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,margin:'10px 0'}}>

            <span style={{flex:1,fontSize:13,textDecoration:t.done?'line-through':'',color:t.done?'#9C9C9C':'#1A1A1A'}}>{t.title}</span>
            <button onClick={()=>db.delLeadTask(lead.id,t.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#D0CEC9',fontSize:13}} onMouseOver={e=>e.target.style.color='#EF4444'} onMouseOut={e=>e.target.style.color='#D0CEC9'}>🗑</button>

          <div style={{display:'flex',gap:6,marginTop:8}}>

function CRMPage({db,nav,currentUser}){
  const [tab,setTab]=useState('all');
  const [search,setSearch]=useState('');
  const [showForm,setShowForm]=useState(false);
  const [editId,setEditId]=useState(null);
  const blank={type:'client',name:'',company:'',phone:'',email:'',role:'',notes:'',project_ids:[],tags:[]};
  const [form,setForm]=useState(blank);
  const [tagInput,setTagInput]=useState('');

  const u=(k,v)=>setForm(f=>({...f,[k]:v}));
  const togProj=pid=>u('project_ids',form.project_ids.includes(pid)?form.project_ids.filter(x=>x!==pid):[...form.project_ids,pid]);
  const addTag=()=>{if(!tagInput.trim()||form.tags.includes(tagInput.trim()))return;u('tags',[...form.tags,tagInput.trim()]);setTagInput('');};
  const remTag=t=>u('tags',form.tags.filter(x=>x!==t));

  const save=()=>{
    if(!form.name.trim())return;
    if(editId)db.updCRM(editId,form);else db.addCRM(form);
    setForm(blank);setEditId(null);setShowForm(false);setTagInput('');
  };
  const startEdit=c=>{setForm({type:c.type,name:c.name,company:c.company||'',phone:c.phone||'',email:c.email||'',role:c.role||'',notes:c.notes||'',project_ids:c.project_ids||[],tags:c.tags||[]});setEditId(c.id);setShowForm(true);};

  const filtered=db.crm.filter(c=>{
    const mt=tab==='all'||c.type===tab;
    const ms=(c.name+' '+(c.company||'')+' '+(c.role||'')+' '+(c.tags||[]).join(' ')).toLowerCase().includes(search.toLowerCase());
    return mt&&ms;
  });

  const counts=Object.keys(TYPE_CFG).reduce((a,t)=>({...a,[t]:db.crm.filter(c=>c.type===t).length}),{});

  return<div>
    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:20}}>
      <div><h1 style={{fontSize:26,fontWeight:600,marginBottom:3}}>CRM — אנשי קשר</h1><p style={{fontSize:14,color:'#8C8C8C'}}>לקוחות, יועצים, ספקים ורשויות — הכל במקום אחד</p></div>
      <Btn onClick={()=>{setShowForm(true);setEditId(null);setForm(blank);}}>+ הוסף איש קשר</Btn>
    </div>

    {/* Type tabs */}
    <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
      <button onClick={()=>setTab('all')} style={{height:34,padding:'0 14px',borderRadius:8,border:tab==='all'?'none':'1px solid #E8E6E1',background:tab==='all'?'#1A1A1A':'white',color:tab==='all'?'white':'#6B6B6B',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'Heebo,sans-serif'}}>
        הכל <span style={{opacity:.7}}>({db.crm.length})</span>
      </button>
      {Object.entries(TYPE_CFG).map(([t,cfg])=><button key={t} onClick={()=>setTab(t)}
        style={{height:34,padding:'0 14px',borderRadius:8,border:tab===t?'none':'1px solid #E8E6E1',background:tab===t?cfg.col:'white',color:tab===t?'white':'#6B6B6B',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'Heebo,sans-serif'}}>
        {cfg.e} {cfg.label} <span style={{opacity:.7}}>({counts[t]})</span>
      </button>)}
    </div>

    <div style={{display:'flex',gap:10,marginBottom:16,alignItems:'center'}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 חיפוש בשם, חברה, תפקיד, תגית..."
        style={{flex:1,height:36,padding:'0 12px',border:'1px solid #E8E6E1',borderRadius:8,fontSize:13,fontFamily:'Heebo,sans-serif'}}/>
    </div>

    {/* Add/Edit Form */}
    {showForm&&<div className="fade" style={{background:'white',border:'1px solid #E8E6E1',borderRadius:12,padding:20,marginBottom:18,boxShadow:'0 2px 12px rgba(0,0,0,.06)'}}>
      <div style={{fontSize:14,fontWeight:600,marginBottom:14}}>{editId?'עריכת איש קשר':'איש קשר חדש'}</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
        <SE label="סוג" value={form.type} onChange={e=>u('type',e.target.value)}>
          {Object.entries(TYPE_CFG).map(([t,c])=><option key={t} value={t}>{c.e} {c.label.slice(0,-2)||c.label}</option>)}
        </SE>
        <I label="שם מלא *" value={form.name} onChange={e=>u('name',e.target.value)} placeholder="שם"/>
        <I label="חברה / ארגון" value={form.company} onChange={e=>u('company',e.target.value)} placeholder="שם חברה"/>
        <I label="תפקיד / התמחות" value={form.role} onChange={e=>u('role',e.target.value)} placeholder="מהנדס קונסטרוקציה..."/>
        <I label="טלפון" value={form.phone} onChange={e=>u('phone',e.target.value)} placeholder="050-0000000"/>
        <I label="אימייל" value={form.email} onChange={e=>u('email',e.target.value)} placeholder="email@example.com"/>
      </div>
      {/* Tags */}
      <div style={{marginBottom:10}}>
        <span style={{display:'block',fontSize:11,fontWeight:600,color:'#8C8C8C',textTransform:'uppercase',marginBottom:5}}>תגיות</span>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:6}}>
          {form.tags.map(t=><span key={t} style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 8px',background:'#F0FDF4',color:'#065F46',borderRadius:999,fontSize:12,border:'1px solid #BBF7D0'}}>
            {t}<button onClick={()=>remTag(t)} style={{background:'none',border:'none',cursor:'pointer',color:'#B0B0B0',fontSize:12,lineHeight:1,padding:0}} onMouseOver={e=>e.target.style.color='#EF4444'} onMouseOut={e=>e.target.style.color='#B0B0B0'}>×</button>
          </span>)}

        <div style={{display:'flex',gap:6}}>
          <input value={tagInput} onChange={e=>setTagInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addTag()}

          <Btn sz="sm" v="outline" onClick={addTag}>+ תגית</Btn>
        </div>
      </div>
      {/* Project links */}
      <div style={{marginBottom:10}}>
        <span style={{display:'block',fontSize:11,fontWeight:600,color:'#8C8C8C',textTransform:'uppercase',marginBottom:6}}>שיוך לפרויקטים</span>

          {db.projects.map(p=><button key={p.id} onClick={()=>togProj(p.id)}

            {form.project_ids.includes(p.id)?'✓ ':''}{p.name}

      </div>
      <TA label="הערות" value={form.notes} onChange={e=>u('notes',e.target.value)} rows={2}/>
      <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:12}}>
        <Btn v="ghost" onClick={()=>{setShowForm(false);setEditId(null);}}>ביטול</Btn>
        <Btn onClick={save} disabled={!form.name.trim()}>{editId?'שמור':'הוסף'}</Btn>
      </div>
    </div>}

    {/* Contact cards */}
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      {filtered.length===0&&<div style={{background:'white',border:'1px solid #E8E6E1',borderRadius:12,padding:48,textAlign:'center',color:'#8C8C8C'}}><div style={{fontSize:36,marginBottom:8}}>👥</div><div>אין אנשי קשר</div></div>}
      {filtered.map(c=>{
        const tc=TYPE_CFG[c.type]||TYPE_CFG.client;
        const linkedProjs=db.projects.filter(p=>(c.project_ids||[]).includes(p.id));
        return<div key={c.id} className="hc" style={{background:'white',border:'1px solid #E8E6E1',borderRadius:12,padding:'12px 16px',display:'flex',alignItems:'flex-start',gap:14,transition:'all .2s'}}>
          <div style={{width:42,height:42,borderRadius:'50%',background:tc.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>{tc.e}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:2,flexWrap:'wrap'}}>
              <span style={{fontSize:14,fontWeight:600}}>{c.name}</span>
              {c.company&&<span style={{fontSize:12,color:'#8C8C8C'}}>| {c.company}</span>}
              <span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:999,background:tc.bg,color:tc.col}}>{tc.label.replace(/ות$/,'')}</span>
            </div>
            {c.role&&<div style={{fontSize:12,color:'#6B6B6B',marginBottom:4}}>{c.role}</div>}
            <div style={{display:'flex',gap:12,flexWrap:'wrap',marginBottom:c.tags?.length||linkedProjs.length?6:0}}>
              {c.phone&&<a href={'tel:'+c.phone} style={{fontSize:12,color:'#4a7c5e',textDecoration:'none'}}>📞 {c.phone}</a>}
              {c.email&&<a href={'mailto:'+c.email} style={{fontSize:12,color:'#4a7c5e',textDecoration:'none'}}>✉️ {c.email}</a>}
            </div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
              {(c.tags||[]).map(t=><span key={t} style={{fontSize:11,padding:'1px 7px',borderRadius:999,background:'#F3F4F6',color:'#6B7280'}}>{t}</span>)}
              {linkedProjs.map(p=><span key={p.id} onClick={()=>nav.toProject(p.id)} style={{fontSize:11,padding:'1px 7px',borderRadius:999,background:'#E8EDE9',color:'#065F46',fontWeight:500,cursor:'pointer'}}>📁 {p.name} ↗</span>)}
            </div>
            {c.notes&&<div style={{fontSize:12,color:'#8C8C8C',marginTop:4,fontStyle:'italic'}}>{c.notes}</div>}
          </div>
          <div style={{display:'flex',gap:4,flexShrink:0}}>
            <Btn v="ghost" sz="sm" onClick={()=>startEdit(c)}>✏️</Btn>
            <Btn v="ghost" sz="sm" sx={{color:'#EF4444'}} onClick={()=>window.confirm('למחוק?')&&db.delCRM(c.id)}>🗑</Btn>
          </div>
        </div>;
      })}
    </div>
  </div>;
}

// ─── Project Consultants Tab ───────────────────────────────────────────────────
function ConsultantsTab({project,db}){
  const linked=db.crm.filter(c=>c.type!=='client'&&(c.project_ids||[]).includes(project.id));
  const unlinked=db.crm.filter(c=>c.type!=='client'&&!(c.project_ids||[]).includes(project.id));
  const toggle=c=>{
    const cur=c.project_ids||[];
    const next=cur.includes(project.id)?cur.filter(x=>x!==project.id):[...cur,project.id];
    db.updCRM(c.id,{project_ids:next});
  };
  const TC=TYPE_CFG;
  return<div>
    <div style={{marginBottom:20}}>
      <div style={{fontSize:13,fontWeight:600,marginBottom:10,color:'#1A1A1A'}}>מעורבים בפרויקט זה ({linked.length})</div>
      {linked.length===0&&<p style={{fontSize:13,color:'#B0B0B0',fontStyle:'italic',marginBottom:12}}>אין יועצים/ספקים משויכים עדיין</p>}
      <div style={{display:'flex',flexDirection:'column',gap:7}}>
        {linked.map(c=>{
          const tc=TC[c.type]||TC.consultant;
          return<div key={c.id} className="hc" style={{display:'flex',alignItems:'center',gap:10,background:'white',border:'1px solid #BBF7D0',borderRadius:10,padding:'10px 14px',transition:'all .2s'}}>
            <span style={{fontSize:18}}>{tc.e}</span>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{c.name}</div><div style={{fontSize:12,color:'#8C8C8C'}}>{c.role}{c.company?' — '+c.company:''}</div></div>
            {c.phone&&<a href={'tel:'+c.phone} style={{fontSize:12,color:'#4a7c5e'}}>📞</a>}
            {c.email&&<a href={'mailto:'+c.email} style={{fontSize:12,color:'#4a7c5e'}}>✉️</a>}
            <Btn v="danger" sz="sm" onClick={()=>toggle(c)}>הסר</Btn>
          </div>;
        })}
      </div>
    </div>
    {unlinked.length>0&&<div>
      <div style={{fontSize:13,fontWeight:600,marginBottom:10,color:'#6B6B6B'}}>הוסף מאנשי הקשר</div>
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {unlinked.map(c=>{
          const tc=TC[c.type]||TC.consultant;
          return<div key={c.id} className="hr" style={{display:'flex',alignItems:'center',gap:10,background:'white',border:'1px solid #F0EDE8',borderRadius:10,padding:'9px 14px',cursor:'pointer'}} onClick={()=>toggle(c)}>
            <span style={{fontSize:16}}>{tc.e}</span>
            <div style={{flex:1}}><div style={{fontSize:13}}>{c.name}</div><div style={{fontSize:12,color:'#8C8C8C'}}>{c.role}</div></div>
            <span style={{fontSize:11,padding:'2px 7px',borderRadius:999,background:tc.bg,color:tc.col}}>{tc.label.replace(/ות$/,'')}</span>
            <Btn v="outline" sz="sm">+ שייך</Btn>
          </div>;
        })}
      </div>
    </div>}
  </div>;
}

// ─── Reports Page ─────────────────────────────────────────────────────────────
function ReportsPage({db,nav}){
  const [selProj,setSP]=useState('all');

  const projs=selProj==='all'?db.projects:db.projects.filter(p=>p.id===selProj);

  // Summary stats
  const totalBudget=projs.reduce((s,p)=>s+(p.budget||0),0);
  const totalPaid=projs.reduce((s,p)=>s+(p.milestones||[]).filter(m=>m.payment_status==='Paid').reduce((ms,m)=>ms+(m.payment_amount||0),0),0);
  const totalTasks=db.tasks.filter(t=>selProj==='all'||t.project_id===selProj).length;
  const doneTasks=db.tasks.filter(t=>(selProj==='all'||t.project_id===selProj)&&t.status==='Done').length;
  const overdueTasks=db.tasks.filter(t=>(selProj==='all'||t.project_id===selProj)&&t.deadline&&new Date(t.deadline)<new Date()&&t.status!=='Done').length;

  // Per-project summary rows
  const projRows=projs.map(p=>{
    const ms=p.milestones||[];
    const prog=ms.length?Math.round(ms.filter(m=>m.completed).length/ms.length*100):0;
    const paid=ms.filter(m=>m.payment_status==='Paid').reduce((s,m)=>s+(m.payment_amount||0),0);
    const pending=ms.filter(m=>m.payment_status==='Unpaid'&&m.payment_amount).reduce((s,m)=>s+(m.payment_amount||0),0);
    const tks=db.tasks.filter(t=>t.project_id===p.id);
    const mgr=db.partners.find(pt=>pt.id===p.manager_id);
    return{...p,prog,paid,pending,tks:tks.length,done:tks.filter(t=>t.status==='Done').length,mgr};
  });

  const printReport=()=>{
    const w=window.open('','_blank');
    const rows=projRows.map(p=>`
      <tr>
        <td>${p.name}</td><td>${p.status}</td><td>${p.mgr?.name||'—'}</td>
        <td>${p.prog}%</td><td>${fmtM(p.paid)}</td><td>${fmtM(p.pending)}</td>
        <td>${p.done}/${p.tks}</td>
      </tr>`).join('');
    w.document.write(`<html dir="rtl"><head><meta charset="UTF-8"><title>ArchStudio — דוח פרויקטים</title>
    <style>body{font-family:Arial,sans-serif;direction:rtl;padding:20px}table{width:100%;border-collapse:collapse;margin-top:20px}th,td{border:1px solid #ddd;padding:8px;text-align:right;font-size:12px}th{background:#3D7A5A;color:white}h1{color:#1A1A1A}p{color:#666;margin:4px 0}</style></head>
    <body><h1>ArchStudio — דוח פרויקטים</h1><p>תאריך: ${new Date().toLocaleDateString('he-IL')}</p>
    <p>סה"כ תקציב: ${fmtM(totalBudget)} | שולם: ${fmtM(totalPaid)}</p>
    <table><thead><tr><th>פרויקט</th><th>סטטוס</th><th>מנהל</th><th>התקדמות</th><th>שולם</th><th>ממתין</th><th>משימות</th></tr></thead>
    <tbody>${rows}</tbody></table></body></html>`);
    w.print();
  };

  const exportCSV=()=>{
    const header='פרויקט,סטטוס,מנהל,התקדמות,שולם,ממתין לתשלום,משימות,הושלמו';
    const rows=projRows.map(p=>[p.name,p.status,p.mgr?.name||'',p.prog+'%',p.paid,p.pending,p.tks,p.done].join(','));
    const csv='\uFEFF'+[header,...rows].join('\n');
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
    a.download='archstudio-report.csv';a.click();
  };

  const STAT_COLS=[
    {l:'תקציב כולל',v:fmtM(totalBudget),bg:'#EBF4EF',col:'#2D5A42',e:'💰'},
    {l:'שולם עד כה',v:fmtM(totalPaid),bg:'#F0FDF4',col:'#065F46',e:'✅'},
    {l:'ממתין לגבייה',v:fmtM(projs.reduce((s,p)=>s+(p.milestones||[]).filter(m=>m.payment_status==='Unpaid'&&m.payment_amount).reduce((ms,m)=>ms+(m.payment_amount||0),0),0)),bg:'#FBF5EE',col:'#92400E',e:'⏳'},
    {l:'משימות באיחור',v:overdueTasks,bg:'#FEF2F2',col:'#991B1B',e:'⚠️'},
  ];

  return<div>
    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:22,flexWrap:'wrap',gap:12}}>
      <div><h1 style={{fontSize:26,fontWeight:700,marginBottom:3,fontFamily:"'DM Sans',sans-serif"}}>דוחות</h1><p style={{fontSize:14,color:'#6B6B6B'}}>סיכום פיננסי ותפעולי</p></div>
      <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
        <select value={selProj} onChange={e=>setSP(e.target.value)} style={{height:36,padding:'0 10px',border:'1px solid var(--border)',borderRadius:8,fontSize:13,background:'white',fontFamily:'Heebo,sans-serif'}}>
          <option value="all">כל הפרויקטים</option>
          {db.projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
        <Btn v="outline" sz="sm" onClick={exportCSV}>📊 CSV</Btn>
        <Btn v="accent" sz="sm" onClick={printReport}>🖨️ הדפסה / PDF</Btn>
      </div>
    </div>

    {/* KPI Row */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:24}}>
      {STAT_COLS.map(s=><div key={s.l} style={{background:s.bg,borderRadius:12,padding:'16px 18px',border:'1px solid '+s.bg}}>
        <div style={{fontSize:22,marginBottom:6}}>{s.e}</div>
        <div style={{fontSize:20,fontWeight:700,color:s.col,marginBottom:2,fontFamily:"'DM Sans',sans-serif"}}>{s.v}</div>
        <div style={{fontSize:11,color:s.col,opacity:.7,textTransform:'uppercase',letterSpacing:'.05em',fontWeight:600}}>{s.l}</div>
      </div>)}
    </div>

    {/* Progress bars per project */}
    <div style={{background:'white',border:'1px solid var(--border)',borderRadius:14,overflow:'hidden',marginBottom:20,boxShadow:'var(--shadow)'}}>
      <div style={{padding:'14px 20px',borderBottom:'1px solid var(--border2)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontSize:14,fontWeight:600}}>פרויקטים — מבט כולל</span>
        <span style={{fontSize:12,color:'#8C8C8C'}}>{projs.length} פרויקטים</span>
      </div>
      {projRows.map((p,i)=>{
        const paidPct=p.budget?Math.round(p.paid/p.budget*100):0;
        return<div key={p.id} style={{padding:'14px 20px',borderTop:i>0?'1px solid var(--border2)':'none',display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
          <div style={{minWidth:160,flex:1}}>
            <div style={{fontSize:13,fontWeight:600,marginBottom:2,cursor:'pointer',color:'var(--green)'}} onClick={()=>nav.toProject(p.id)} title='פתח פרויקט'>{p.name} ↗</div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <SBadge status={p.status}/>
              {p.mgr&&<span style={{fontSize:11,color:'#8C8C8C'}}>🧑‍💼 {p.mgr.name}</span>}
            </div>
          </div>
          {/* Progress */}
          <div style={{minWidth:140}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style={{fontSize:11,color:'#8C8C8C'}}>אבני דרך</span><span style={{fontSize:11,fontWeight:600}}>{p.prog}%</span></div>
            <div style={{height:6,background:'#F0EDE8',borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',background:'var(--green)',width:p.prog+'%',borderRadius:3,transition:'width .5s'}}/></div>
          </div>
          {/* Tasks */}
          <div style={{minWidth:100,textAlign:'center'}}>
            <div style={{fontSize:18,fontWeight:700,color:'var(--green)'}}>{p.tks>0?Math.round(p.done/p.tks*100):0}%</div>
            <div style={{fontSize:11,color:'#8C8C8C'}}>{p.done}/{p.tks} משימות</div>
          </div>
          {/* Payments */}
          <div style={{minWidth:160}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style={{fontSize:11,color:'#8C8C8C'}}>גבייה</span><span style={{fontSize:11,fontWeight:600,color:'var(--green)'}}>{fmtM(p.paid)}</span></div>
            <div style={{height:6,background:'#F0EDE8',borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',background:'var(--gold)',width:paidPct+'%',borderRadius:3}}/></div>
            {p.pending>0&&<div style={{fontSize:11,color:'var(--gold)',marginTop:3}}>ממתין: {fmtM(p.pending)}</div>}
          </div>
        </div>;
      })}
      {projRows.length===0&&<div style={{padding:48,textAlign:'center',color:'#8C8C8C'}}>אין פרויקטים</div>}
    </div>

    {/* Cross-project Cashflow */}
    <div style={{background:'white',border:'1px solid var(--border)',borderRadius:14,overflow:'hidden',marginBottom:20,boxShadow:'var(--shadow)'}}>
      <div style={{padding:'14px 20px',borderBottom:'1px solid var(--border2)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontSize:14,fontWeight:600}}>תזרים הכנסות — כל הפרויקטים</span>
        <span style={{fontSize:12,color:'#8C8C8C'}}>צפוי מול בפועל</span>
      </div>
      <div style={{padding:'16px 20px'}}>
        <CashflowChart ms={projs.flatMap(p=>p.milestones||[])} height={200}/>
      </div>
    </div>

    {/* Monthly summary table */}
    {(()=>{
      const allMs=projs.flatMap(p=>(p.milestones||[]).map(m=>({...m,projName:p.name})));
      const byMonth={};
      allMs.filter(m=>m.payment_amount>0&&(m.expected_date||m.date)).forEach(m=>{
        const d=new Date(m.expected_date||m.date);
        const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        if(!byMonth[key])byMonth[key]={key,expected:0,paid:0,items:[]};
        byMonth[key].expected+=m.payment_amount||0;
        if(m.payment_status==='Paid')byMonth[key].paid+=m.payment_amount||0;
        byMonth[key].items.push({...m});
      });
      const months=Object.values(byMonth).sort((a,b)=>a.key.localeCompare(b.key));
      if(months.length===0)return null;
      const fmtMonth=key=>{const[y,mo]=key.split('-');return new Date(y,mo-1).toLocaleDateString('he-IL',{month:'long',year:'numeric'});};
      const today=new Date();
      return<div style={{background:'white',border:'1px solid var(--border)',borderRadius:14,overflow:'hidden',marginBottom:20,boxShadow:'var(--shadow)'}}>
        <div style={{padding:'14px 20px',borderBottom:'1px solid var(--border2)'}}>
          <span style={{fontSize:14,fontWeight:600}}>סיכום חודשי</span>
        </div>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{background:'#FAFAF8'}}>
            {['חודש','צפי גבייה','שולם','יתרה','סטטוס'].map(h=><th key={h} style={{padding:'10px 16px',textAlign:'right',fontSize:11,fontWeight:700,color:'#8C8C8C',textTransform:'uppercase',letterSpacing:'.05em',borderBottom:'1px solid var(--border2)'}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {months.map((m,i)=>{
              const isPast=new Date(m.key+'-28')<today;
              const delta=m.paid-m.expected;
              return<tr key={m.key} className="trow" style={{borderTop:i>0?'1px solid var(--border2)':'none'}}>
                <td style={{padding:'10px 16px',fontSize:13,fontWeight:600}}>{fmtMonth(m.key)}</td>
                <td style={{padding:'10px 16px',fontSize:13}}>{fmtM(m.expected)}</td>
                <td style={{padding:'10px 16px',fontSize:13,color:m.paid>0?'#3D7A5A':'#9C9C9C',fontWeight:m.paid>0?600:400}}>{m.paid>0?fmtM(m.paid):'—'}</td>
                <td style={{padding:'10px 16px',fontSize:13,color:delta<0?'#DC2626':delta>0?'#3D7A5A':'#9C9C9C',fontWeight:600}}>{delta!==0?(delta>0?'+':'')+fmtM(delta):'—'}</td>
                <td style={{padding:'10px 16px'}}><span style={{fontSize:11,fontWeight:600,padding:'2px 8px',borderRadius:999,background:m.paid>=m.expected?'#ECFDF5':isPast?'#FEF2F2':'#FFFBEB',color:m.paid>=m.expected?'#065F46':isPast?'#DC2626':'#B45309'}}>{m.paid>=m.expected?'✓ שולם':isPast?'⚠️ באיחור':'⏳ צפוי'}</span></td>
              </tr>;
            })}
          </tbody>
          <tfoot><tr style={{background:'#F5F4F0',borderTop:'2px solid var(--border)'}}>
            <td style={{padding:'10px 16px',fontSize:13,fontWeight:700}}>סה"כ</td>
            <td style={{padding:'10px 16px',fontSize:13,fontWeight:700}}>{fmtM(months.reduce((s,m)=>s+m.expected,0))}</td>
            <td style={{padding:'10px 16px',fontSize:13,fontWeight:700,color:'#3D7A5A'}}>{fmtM(months.reduce((s,m)=>s+m.paid,0))}</td>
            <td colSpan={2}/>
          </tr></tfoot>
        </table>
      </div>;
    })()}

    {/* Tasks breakdown */}
    <div style={{background:'white',border:'1px solid var(--border)',borderRadius:14,overflow:'hidden',boxShadow:'var(--shadow)'}}>
      <div style={{padding:'14px 20px',borderBottom:'1px solid var(--border2)'}}>
        <span style={{fontSize:14,fontWeight:600}}>פילוח משימות לפי שותף</span>
      </div>
      {db.partners.map((pt,i)=>{
        const myT=db.tasks.filter(t=>(selProj==='all'||t.project_id===selProj)&&t.assignee_id===pt.id);
        if(myT.length===0)return null;
        const dn=myT.filter(t=>t.status==='Done').length;
        const ip=myT.filter(t=>t.status==='In Progress').length;
        const od=myT.filter(t=>t.deadline&&new Date(t.deadline)<new Date()&&t.status!=='Done').length;
        const pct=Math.round(dn/myT.length*100);
        return<div key={pt.id} style={{padding:'12px 20px',borderTop:i>0?'1px solid var(--border2)':'none',display:'flex',alignItems:'center',gap:14}}>
          <div style={{width:36,height:36,borderRadius:'50%',background:pt.color,display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:700,fontSize:14,flexShrink:0}}>{pt.name[0]}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:500,marginBottom:4}}>{pt.name} <span style={{fontSize:11,color:'#8C8C8C',fontWeight:400}}>{pt.role}</span></div>
            <div style={{height:5,background:'#F0EDE8',borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',background:pt.color,width:pct+'%',borderRadius:3}}/></div>
          </div>
          <div style={{display:'flex',gap:16,fontSize:12,flexShrink:0}}>
            <span style={{color:'var(--green)',fontWeight:600}}>{dn} הושלמו</span>
            <span style={{color:'#B45309',fontWeight:600}}>{ip} בתהליך</span>
            {od>0&&<span style={{color:'var(--red)',fontWeight:600}}>⚠️ {od} באיחור</span>}
          </div>
        </div>;
      })}
    </div>
  </div>;
}
